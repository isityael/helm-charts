apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-basic-memory-test-values
  labels:
    helm.sh/chart: basic-memory-0.3.26
    app.kubernetes.io/name: basic-memory
    app.kubernetes.io/instance: ci-basic-memory-test-values
    app.kubernetes.io/version: "0.22.1"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: basic-memory
      app.kubernetes.io/instance: ci-basic-memory-test-values
      app.kubernetes.io/component: server
  template:
    metadata:
      annotations:
        checksum/config: efe6d721fb0f1cb6b0c50c2d30548b5bf2cb2c540e6d84735294cd0ab7809c45
      labels:
        app.kubernetes.io/name: basic-memory
        app.kubernetes.io/instance: ci-basic-memory-test-values
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: ci-basic-memory-test-values
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
      initContainers:
        # Prepare writable Basic Memory home dir for config + runtime logs.
        # ConfigMap volumes are read-only, so we copy config.json into the home PVC.
        - name: basic-memory-home-init
          image: busybox:1.37
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /config-home/config
              cp /config-src/config.json /config-home/config/config.json
              chmod 0700 /config-home/config
              chmod 0644 /config-home/config/config.json
          volumeMounts:
            - name: basic-memory-config
              mountPath: /config-src
              readOnly: true
            - name: basic-memory-home
              mountPath: /config-home
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
        # Warm the fastembed model cache onto persistent storage BEFORE the
        # runtime container enters offline mode (HF_HUB_OFFLINE=1). Keeps
        # semantic search stable on fresh PVCs without re-enabling network
        # fetches at runtime.
        - name: semantic-model-cache-init
          image: "ghcr.io/basicmachines-co/basic-memory:0.22.1@sha256:0da35f465fed7b58b6c2e31e7c0dbcbc728760a1b6a71857cfe3ced847c727a1"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: HOME
              value: /tmp
            - name: HF_HUB_OFFLINE
              value: "0"
            - name: BASIC_MEMORY_SEMANTIC_EMBEDDING_CACHE_DIR
              value: "/app/data/fastembed_cache"
            - name: BASIC_MEMORY_SEMANTIC_MODEL_NAME
              value: "BAAI/bge-small-en-v1.5"
          command:
            - /app/.venv/bin/python
            - -c
            - |
              import os
              from fastembed import TextEmbedding
              cache_dir = os.environ["BASIC_MEMORY_SEMANTIC_EMBEDDING_CACHE_DIR"]
              model_name = os.environ["BASIC_MEMORY_SEMANTIC_MODEL_NAME"]
              os.makedirs(cache_dir, exist_ok=True)
              embedding = TextEmbedding(model_name=model_name, cache_dir=cache_dir)
              next(iter(embedding.embed(["basic-memory semantic cache bootstrap"])))
              print(f"semantic model cache ready for {model_name} at {cache_dir}")
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      containers:
        - name: basic-memory
          image: "ghcr.io/basicmachines-co/basic-memory:0.22.1@sha256:0da35f465fed7b58b6c2e31e7c0dbcbc728760a1b6a71857cfe3ced847c727a1"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          command:
            - basic-memory
            - mcp
            - --transport
            - streamable-http
            - --port
            - "8001"
          ports:
            - name: upstream
              containerPort: 8001
              protocol: TCP
          env:
            - name: BASIC_MEMORY_CONFIG_DIR
              value: "/home/appuser/.basic-memory/config"
            - name: BASIC_MEMORY_DEFAULT_PROJECT
              value: "main"
            - name: BASIC_MEMORY_HOME
              value: "/app/data/basic-memory"
            - name: BASIC_MEMORY_LOG_LEVEL
              value: "INFO"
            - name: BASIC_MEMORY_SEMANTIC_EMBEDDING_CACHE_DIR
              value: "/app/data/fastembed_cache"
            - name: BASIC_MEMORY_SYNC_MAX_CONCURRENT_FILES
              value: "4"
            - name: BASIC_MEMORY_SYNC_THREAD_POOL_SIZE
              value: "2"
            - name: BASIC_MEMORY_WATCH_PROJECT_RELOAD_INTERVAL
              value: "900"
            - name: HF_HUB_OFFLINE
              value: "1"
          volumeMounts:
            - name: basic-memory-home
              mountPath: /home/appuser/.basic-memory
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
            - name: pip-local
              mountPath: /home/appuser/.local
            - name: pip-cache
              mountPath: /home/appuser/.cache
          startupProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 256Mi
        # MCP compatibility shim sidecar — normalises non-compliant JSON-RPC
        # and enforces write/delete policy. The Service targets this container.
        - name: mcp-shim
          image: "dhi.io/deno:2.9.2-debian13@sha256:e55bf10a382c84a26691f5f6fb8f8fd2bc7aac4a0fa5d3e0e5bc97443b6c4ab0"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: HOME
              value: /tmp
            - name: MCP_SHIM_LISTEN_PORT
              value: "8000"
            - name: MCP_SHIM_UPSTREAM_PORT
              value: "8001"
            - name: MCP_SHIM_DEFAULT_PROJECT
              value: "main"
            - name: MCP_SHIM_MAX_TOOL_CALL_CONCURRENCY
              value: "4"
            - name: MCP_SHIM_TOOL_CALL_QUEUE_TIMEOUT_MS
              value: "12000"
            - name: MCP_SHIM_UPSTREAM_TIMEOUT_MS
              value: "45000"
            - name: MCP_SHIM_THROTTLED_TOOLS
              value: "write_note,edit_note,move_note,delete_note"
            - name: MCP_SHIM_ALLOWED_NOTE_DIRS
              value: "ci-test"
            - name: MCP_SHIM_ALLOW_DELETE_NOTE
              value: "false"
          command:
            - deno
            - run
            - -A
            - /shim/shim.ts
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
