spec:
  selector:
    matchLabels:
      app: cloudflared
      app.kubernetes.io/name: cloudflared
      app.kubernetes.io/instance: ci-cloudflared-test-values
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  minReadySeconds: 30
  template:
    metadata:
      annotations:
        checksum/config: af8b693424e20173fc18810fb6636f1eee253826f9e793cedb1d5d1be8527f75
      labels:
        app: cloudflared
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/instance: ci-cloudflared-test-values
    spec:
      serviceAccountName: ci-cloudflared-test-values
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        sysctls:
        - name: net.ipv4.ping_group_range
          value: 0 2147483647
      terminationGracePeriodSeconds: 30
      containers:
        - name: cloudflared
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: []
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          image: "cloudflare/cloudflared@sha256:188bb03589a32affed3cf4d0590565ffe67b78866e6b5582574afab2b705bafe"
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config/config.yaml
            - run
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 2000
              protocol: TCP
          env:
            - name: TUNNEL_ORIGIN_CERT
              value: "/etc/cloudflared/creds/cert.pem"
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/creds
              readOnly: true
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
      volumes:
        - name: creds
          projected:
            sources:
              - secret:
                  name: ci-cloudflared-test-values-tunnel-credentials
        - name: config
          configMap:
            name: ci-cloudflared-test-values
            items:
              - key: config.yaml
                path: config.yaml
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - effect: NoSchedule
          operator: Exists
