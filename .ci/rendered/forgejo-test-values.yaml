apiVersion: v1
kind: Secret
metadata:
  name: ci-forgejo-test-values
  namespace: "ci-forgejo"
  labels:
    helm.sh/chart: forgejo-17.1.2
    app: forgejo
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/instance: ci-forgejo-test-values
    app.kubernetes.io/version: "2b3887b6"
    version: "2b3887b6"
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  assertions: |
  config_environment.sh: |-
    #!/usr/bin/env bash
    set -euo pipefail
    
    function env2ini::log() {
      printf '%b\n' "$1"
    }
    
    function env2ini::read_config_to_env() {
      local section="${1}"
      local line="${2}"
    
      if [[ -z "${line}" ]]; then
        # skip empty line
        return
      fi
    
      # 'xargs echo -n' trims all leading/trailing whitespaces and a trailing new line
      local setting
      setting="$(awk -F '=' '{print $1}' <<< "${line}" | xargs echo -n)"
    
      if [[ -z "${setting}" ]]; then
        env2ini::log '  ! invalid setting'
        exit 1
      fi
    
      local value=''
      local regex="^${setting}(\s*)=(\s*)(.*)"
      if [[ $line =~ $regex ]]; then
        value="${BASH_REMATCH[3]}"
      else
        env2ini::log '  ! invalid setting'
        exit 1
      fi
    
      env2ini::log "    + '${setting}'"
    
      local masked_setting="${setting//./_0X2E_}"                           # '//' instructs to replace all matches
      masked_setting="${masked_setting//-/_0X2D_}"
    
      if [[ -z "${section}" ]]; then
        export "FORGEJO____${masked_setting^^}=${value}"                           # '^^' makes the variable content uppercase
        return
      fi
    
      local masked_section="${section//./_0X2E_}"                           # '//' instructs to replace all matches
      masked_section="${masked_section//-/_0X2D_}"
    
      export "FORGEJO__${masked_section^^}__${masked_setting^^}=${value}"          # '^^' makes the variable content uppercase
    }
    
    function env2ini::reload_preset_envs() {
      env2ini::log "Reloading preset envs..."
    
      while read -r line; do
        if [[ -z "${line}" ]]; then
          # skip empty line
          return
        fi
    
        # 'xargs echo -n' trims all leading/trailing whitespaces and a trailing new line
        local setting
        setting="$(awk -F '=' '{print $1}' <<< "${line}" | xargs echo -n)"
    
        if [[ -z "${setting}" ]]; then
          env2ini::log '  ! invalid setting'
          exit 1
        fi
    
        local value=''
        local regex="^${setting}(\s*)=(\s*)(.*)"
        if [[ $line =~ $regex ]]; then
          value="${BASH_REMATCH[3]}"
        else
          env2ini::log '  ! invalid setting'
          exit 1
        fi
    
        env2ini::log "  + '${setting}'"
    
        export "${setting^^}=${value}"                           # '^^' makes the variable content uppercase
      done < "/tmp/existing-envs"
    
      rm /tmp/existing-envs
    }
    
    
    function env2ini::process_config_file() {
      local config_file="${1}"
      local section
      section="$(basename "${config_file}")"
    
      if [[ $section == '_generals_' ]]; then
        env2ini::log "  [ini root]"
        section=''
      else
        env2ini::log "  ${section}"
      fi
    
      while read -r line; do
        env2ini::read_config_to_env "${section}" "${line}"
      done < <(awk 1 "${config_file}")                             # Helm .toYaml trims the trailing new line which breaks line processing; awk 1 ... adds it back while reading
    }
    
    function env2ini::load_config_sources() {
      local path="${1}"
    
      if [[ -d "${path}" ]]; then
        env2ini::log "Processing $(basename "${path}")..."
    
        while read -r -d '' configFile; do
          env2ini::process_config_file "${configFile}"
        done < <(find "${path}" -type l -not -name '..data' -print0)
    
        env2ini::log "\n"
      fi
    }
    
    function env2ini::generate_initial_secrets() {
      # These environment variables will either be
      #   - overwritten with user defined values,
      #   - initially used to set up Forgejo
      # Anyway, they won't harm existing app.ini files
    
      FORGEJO__SECURITY__INTERNAL_TOKEN=$(gitea generate secret INTERNAL_TOKEN)
      export FORGEJO__SECURITY__INTERNAL_TOKEN
      FORGEJO__SECURITY__SECRET_KEY=$(gitea generate secret SECRET_KEY)
      export FORGEJO__SECURITY__SECRET_KEY
      FORGEJO__OAUTH2__JWT_SECRET=$(gitea generate secret JWT_SECRET)
      export FORGEJO__OAUTH2__JWT_SECRET
      FORGEJO__SERVER__LFS_JWT_SECRET=$(gitea generate secret LFS_JWT_SECRET)
      export FORGEJO__SERVER__LFS_JWT_SECRET
    
      env2ini::log "...Initial secrets generated\n"
    }
    
    # save existing envs prior to script execution. Necessary to keep order of
    # preexisting and custom envs
    env | (grep -e '^FORGEJO__' || [[ $? == 1 ]]) > /tmp/existing-envs
    
    # MUST BE CALLED BEFORE OTHER CONFIGURATION
    env2ini::generate_initial_secrets
    
    env2ini::load_config_sources '/env-to-ini-mounts/inlines/'
    env2ini::load_config_sources '/env-to-ini-mounts/additionals/'
    
    # load existing envs to override auto generated envs
    env2ini::reload_preset_envs
    
    env2ini::log "=== All configuration sources loaded ===\n"
    
    # safety to prevent rewrite of secret keys if an app.ini already exists
    if [ -f "${GITEA_APP_INI}" ]; then
      env2ini::log 'An app.ini file already exists. To prevent overwriting secret keys, these settings are dropped and remain unchanged:'
      env2ini::log '  - security.INTERNAL_TOKEN'
      env2ini::log '  - security.SECRET_KEY'
      env2ini::log '  - oauth2.JWT_SECRET'
      env2ini::log '  - server.LFS_JWT_SECRET'
    
      unset FORGEJO__SECURITY__INTERNAL_TOKEN
      unset FORGEJO__SECURITY__SECRET_KEY
      unset FORGEJO__OAUTH2__JWT_SECRET
      unset FORGEJO__SERVER__LFS_JWT_SECRET
    fi
    
    environment-to-ini -o "${GITEA_APP_INI}"
    

