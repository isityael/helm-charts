    app.kubernetes.io/instance: ci-forgejo-test-values
    app.kubernetes.io/version: "2b3887b6"
    version: "2b3887b6"
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  configure_gpg_environment.sh: |-
    #!/usr/bin/env bash
    set -eu
    
    gpg --batch --import /raw/private.asc
    
  configure_ssh_signing.sh: |-
    #!/usr/bin/env bash
    set -eu
    
    install -m 600 /raw/ssh-signing-key /data/git/.ssh-signing/key
    ssh-keygen -y -f /data/git/.ssh-signing/key > /data/git/.ssh-signing/key.pub
    chmod 644 /data/git/.ssh-signing/key.pub
    
  init_directory_structure.sh: |-
    #!/usr/bin/env bash
    
    set -euo pipefail
    
    set -x
    mkdir -p /data/git/.ssh
    chmod -R 700 /data/git/.ssh
    [ ! -d /data/gitea/conf ] && mkdir -p /data/gitea/conf
    
    # prepare temp directory structure
    mkdir -p "${GITEA_TEMP}"
    chmod ug+rwx "${GITEA_TEMP}"
    
    
    
    
  configure_gitea.sh: |-
    #!/usr/bin/env bash
    
    set -euo pipefail
    
    echo '==== BEGIN GITEA CONFIGURATION ===='
    
    { # try
      gitea migrate
    } || { # catch
      echo "Forgejo migrate might fail due to database connection...This init-container will try again in a few seconds"
      exit 1
    }
    
    function configure_ldap() {
        echo 'no ldap configuration... skipping.'
    }
    
    configure_ldap
    
    function configure_oauth() {
        echo 'no oauth configuration... skipping.'
    }
    
    configure_oauth
    
    echo '==== END GITEA CONFIGURATION ===='
    

