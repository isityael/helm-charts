            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
            runAsGroup: 0
            runAsUser: 0
          volumeMounts:
            - name: docker-graph
              mountPath: /var/lib/docker
            - name: docker-socket
              mountPath: /var/run
            - name: docker-daemon-config
              mountPath: /etc/docker/daemon.json
              subPath: daemon.json
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 100m
              memory: 256Mi

        
        - name: runner
          image: "ghcr.io/isityael/forgejo-runner:12.12.0-a1a383f9@sha256:7edf0bf1125982fea00a357e4226f919ed1fd10df34d39b4494400c142363c85"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              until nc -z 127.0.0.1 2375; do
                echo "waiting for Docker daemon"
                sleep 2
              done
              if [ ! -s "/data/.runner" ]; then
                if [ -z "${FORGEJO_INSTANCE_URL:-}" ] || [ -z "${FORGEJO_RUNNER_REGISTRATION_TOKEN:-}" ]; then
                  echo "missing runner.instanceURL or runner.registrationTokenSecret and no existing .runner file"
                  exit 1
                fi
                forgejo-runner register \
                  --no-interactive \
                  --config /etc/forgejo-runner/config.yaml \
                  --instance "${FORGEJO_INSTANCE_URL}" \
                  --token "${FORGEJO_RUNNER_REGISTRATION_TOKEN}" \
                  --name "${FORGEJO_RUNNER_NAME}" \
                  --labels "${FORGEJO_RUNNER_LABELS}"
              fi
              exec forgejo-runner --config /etc/forgejo-runner/config.yaml daemon
          env:
            - name: FORGEJO_INSTANCE_URL
              value: "http://forgejo-http.default.svc.cluster.local:3000/"
            - name: FORGEJO_RUNNER_NAME
              value: "test-forgejo-runner"
            - name: FORGEJO_RUNNER_LABELS
              value: "docker:docker://ghcr.io/isityael/forgejo-job-alpine:3.23"
            - name: FORGEJO_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-registration
                  key: REGISTRATION_TOKEN
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
            - name: DOCKER_CONFIG
              value: /tmp/.docker
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            privileged: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: runner-config
              mountPath: /etc/forgejo-runner
              readOnly: true
            - name: docker-socket
              mountPath: /var/run
            - name: runner-data
              mountPath: /data
            - name: docker-config
              mountPath: /tmp/.docker
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: runner-config
          secret:
            secretName: ci-forgejo-test-values-runner-config
        - name: docker-graph
          emptyDir: {}
        - name: docker-socket
          emptyDir: {}
        - name: runner-data
          persistentVolumeClaim:
            claimName: ci-forgejo-test-values-runner-data
        - name: docker-config
          emptyDir: {}
        - name: docker-daemon-config
          configMap:
            name: ci-forgejo-test-values-runner-docker-daemon
            items:
              - key: daemon.json
                path: daemon.json

