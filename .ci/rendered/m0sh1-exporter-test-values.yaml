    matchLabels:
      app.kubernetes.io/name: pveexporter
      app.kubernetes.io/instance: ci-m0sh1-exporter-test-values
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pveexporter
        app.kubernetes.io/instance: ci-m0sh1-exporter-test-values
    spec:
      serviceAccountName: prometheus-pve-exporter
      containers:
        - name: pveexporter
          image: "docker.io/prompve/prometheus-pve-exporter:3.9.0@sha256:78a58df7a31c9fbee94962cd06422672668529de6421892df9aed4b6cee0757f"
          imagePullPolicy: Always
          env:
            - name: PVE_USER
              value: "pve-exporter@pve"
            - name: PVE_VERIFY_SSL
              value: "false"
            - name: PVE_TOKEN_NAME
              valueFrom:
                secretKeyRef:
                  name: "monitoring-pve-exporter"
                  key: "tokenName"
            - name: PVE_TOKEN_VALUE
              valueFrom:
                secretKeyRef:
                  name: "monitoring-pve-exporter"
                  key: "tokenValue"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 9221
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

