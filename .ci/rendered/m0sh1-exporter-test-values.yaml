apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: prometheus-pve-exporter
  namespace: monitoring
  labels:
    helm.sh/chart: pveexporter-2.8.0
    app.kubernetes.io/name: pveexporter
    app.kubernetes.io/instance: ci-m0sh1-exporter-test-values
    app.kubernetes.io/version: "3.9.0"
    app.kubernetes.io/managed-by: Helm
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - ci-m0sh1-exporter
  selector:
    matchLabels:
      app.kubernetes.io/name: pveexporter
      app.kubernetes.io/instance: ci-m0sh1-exporter-test-values
  endpoints:
    - port: http
      interval: 30s
      path: /metrics
      metricRelabelConfigs:
        - replacement: prometheus-pve-exporter
          targetLabel: instance
    - port: http
      path: /pve
      params:
        target:
          - 10.0.10.11
          - 10.0.10.12
          - 10.0.10.13
      metricRelabelConfigs:
        - replacement: prometheus-pve-exporter
          targetLabel: instance

