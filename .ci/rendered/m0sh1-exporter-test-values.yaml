# Source: m0sh1-exporter/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opnsense-exporter
  namespace: ci-m0sh1-exporter
  labels:
    helm.sh/chart: m0sh1-exporter-0.1.17
    app.kubernetes.io/name: opnsense-exporter
    app.kubernetes.io/instance: ci-m0sh1-exporter-test-values
    app.kubernetes.io/version: "0.0.15"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opnsense-exporter
      app.kubernetes.io/instance: ci-m0sh1-exporter-test-values
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opnsense-exporter
        app.kubernetes.io/instance: ci-m0sh1-exporter-test-values
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: opnsense-exporter
          image: "ghcr.io/isityael/opnsense-exporter:v0.0.15-m0sh1.3@sha256:f36a0ab09d00f9cdd8531dfa7289f586a3dc1e04c10d1618b836c3826073292d"
          imagePullPolicy: IfNotPresent
          args:
            - --opnsense.protocol=https
            - --opnsense.address=opn.m0sh1.cc
            - --exporter.instance-label=opnsense
            - --web.listen-address=:8080
          env:
            - name: OPNSENSE_EXPORTER_OPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opnsense-exporter-api
                  key: api-key
            - name: OPNSENSE_EXPORTER_OPS_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: opnsense-exporter-api
                  key: api-secret
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

