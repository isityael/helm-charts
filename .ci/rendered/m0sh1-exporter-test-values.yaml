# Source: m0sh1-exporter/templates/vmservicescrape-snmp.yaml
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: prometheus-snmp-exporter-edgerouter-x
  namespace: monitoring
  labels:
    helm.sh/chart: snmpExporter-9.14.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: snmpExporter
    app.kubernetes.io/name: snmpExporter
    app.kubernetes.io/instance: ci-m0sh1-exporter-test-values
    app.kubernetes.io/version: "v0.30.1-m0sh1.1"
    release: "kube-prometheus-stack"
spec:
  namespaceSelector:
    matchNames:
      - ci-m0sh1-exporter
  selector:
    matchLabels:
      app.kubernetes.io/name: snmpExporter
      app.kubernetes.io/instance: ci-m0sh1-exporter-test-values
  endpoints:
    - port: http
      honorLabels: true
      path: /snmp
      interval: 2m
      scrapeTimeout: 25s
      params:
        module:
          - if_mib
        auth:
          - public_v2
        target:
          - 10.0.0.2
      metricRelabelConfigs:
        - sourceLabels: [instance]
          targetLabel: instance
          replacement: 10.0.0.2
          action: replace
        - sourceLabels: [target]
          targetLabel: target
          replacement: edgerouter-x
          action: replace
        - targetLabel: instance
          replacement: "edgerouter-x"
          action: replace
