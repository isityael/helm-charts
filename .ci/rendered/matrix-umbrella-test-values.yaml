# Source: matrix-umbrella/charts/ess/templates/matrix-authentication-service/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ci-matrix-umbrella-test-values-matrix-authentication-service
  namespace: ci-matrix-umbrella
  labels:

    helm.sh/chart: "ess-26.6.2"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: matrix-stack
    app.kubernetes.io/component: matrix-authentication
    app.kubernetes.io/name: matrix-authentication-service
    app.kubernetes.io/instance: ci-matrix-umbrella-test-values-matrix-authentication-service
    app.kubernetes.io/version: "1.19.0"
data:
  mas-config-underrides.yaml: |

    policy:
      data:
        admin_clients: []
        admin_users: []
        client_registration:
          allow_host_mismatch: false
          allow_insecure_uris: false
  mas-config-overrides.yaml: |
    http:
      public_base: "https://account.ci.example.test"
      listeners:
      - name: web
        binds:
        - port: 8080
        resources:
        - name: human
        - name: discovery
        - name: oauth
        - name: compat
        - name: assets
        - name: graphql
          # This lets us use the GraphQL API with an OAuth 2.0 access token,
          # which we currently use in the ansible modules and in synapse-admin
          undocumented_oauth2_access: true
        - name: adminapi
      - name: internal
        binds:
        - port: 8081
        resources:
        - name: health
        - name: prometheus
        - name: connection-info


    database:
      uri: "postgresql://mas:${POSTGRES_PASSWORD}@postgres.ci.svc.cluster.local:5432/mas?sslmode=prefer&application_name=matrix-authentication-service"

    telemetry:
      metrics:
