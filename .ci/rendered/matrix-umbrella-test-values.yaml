    enable_metrics: true
    log_config: "/conf/log_config.yaml"
    macaroon_secret_key_path:  /secrets/ci-matrix-umbrella-test-values-generated/SYNAPSE_MACAROON
    registration_shared_secret_path: /secrets/ci-matrix-umbrella-test-values-generated/SYNAPSE_REGISTRATION_SHARED_SECRET

    database:
      name: psycopg2
      args:
        user: synapse
        password: ${SYNAPSE_POSTGRES_PASSWORD}
        dbname: synapse
        host: postgres.ci.svc.cluster.local
        port: 5432
        sslmode: prefer

        application_name: ${APPLICATION_NAME}

