    - '192.168.0.0/16'
    - '100.64.0.0/10'
    - '192.0.0.0/24'
    - '169.254.0.0/16'
    - '192.88.99.0/24'
    - '198.18.0.0/15'
    - '192.0.2.0/24'
    - '198.51.100.0/24'
    - '203.0.113.0/24'
    - '224.0.0.0/4'
    - '::1/128'
    - 'fe80::/10'
    - 'fc00::/7'
    - '2001:db8::/32'
    - 'ff00::/8'
    - 'fec0::/10'

    database:
      args:
        keepalives: 1
        keepalives_idle: 10
        keepalives_interval: 10
        keepalives_count: 3

        # Synapse has no defaults, so up from Twisted's defaults of 3-5
        cp_min: 5
        cp_max: 10

  04-homeserver-overrides.yaml: |
    public_baseurl: https://matrix.ci.example.test/
    server_name: ci.example.test
