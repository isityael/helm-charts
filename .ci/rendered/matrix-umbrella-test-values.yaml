# Source: matrix-umbrella/charts/ess/templates/haproxy/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  labels:

    helm.sh/chart: "ess-26.6.2"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: matrix-stack
    app.kubernetes.io/component: matrix-stack-ingress
    app.kubernetes.io/name: haproxy
    app.kubernetes.io/instance: ci-matrix-umbrella-test-values-haproxy
    app.kubernetes.io/version: "3.4.2-debian13"
  name: ci-matrix-umbrella-test-values-haproxy
  namespace: ci-matrix-umbrella
data:
  haproxy.cfg: |+
    global
      log stdout format raw local0 info

      # Allow for rewriting HTTP headers (e.g. Authorization) up to 4k
      # https://github.com/haproxy/haproxy/issues/1743
      tune.maxrewrite 4096

      # Allow HAProxy Stats sockets
      stats socket ipv4@127.0.0.1:1999 level admin

      # In a dual-stack cluster, HAProxy will receive both the A and AAAA records for each backing Pod.
      # This is either in the additional section of the response or when directly querying the hostname in the SRV response.
      # As a backend server can only have a single IP address and `resolve-prefer` doesn't appear to impact SRV results,
      # we end up having the IP for each backend server flapping between IPv4, IPv6.
      # This also appears to cause a memory leak in HAProxy.
      # The default (`ipv4,ipv6`) and `auto` (IPv4 + IPv6 if there's an IPv6 gateway) are both problematic and so we must set one.
      # In the dual-stack case, we pick IPv4 only as that's most likely to work, however this means that IPv6 only clusters
      # needs to adjust network.ipFamily to `ipv6` rather than leaving it at `dual-stack`.
      #
      # The only alternative found is to tweak `hold obsolete` up from the default of 0s in the `resolvers` section.
      # This has the undesirable behaviour of making HAProxy slower to respond to Pod restarts
      dns-accept-family ipv4

    defaults
      mode http

      log global

      # The Ingress Controller should appropriately set an X-Forwarded-For header
      # We leave it alone if it has, but add in the source address in cases where it hasn't
      # or the request hasn't come from the ingress controller (i.e. in-cluster)
      option forwardfor if-none

      # Set the RFC7239 `Forwarded` header
      option forwarded

      # wait for 5s when connecting to a server
      timeout connect 5s

      # ... but if there is a backlog of requests, wait for 60s before returning a 500
      timeout queue 60s

      # close client connections 5m after the last request
      # (as recommened by https://support.cloudflare.com/hc/en-us/articles/212794707-General-Best-Practices-for-Load-Balancing-with-CloudFlare)
      timeout client 900s

      # give clients 5m between requests (otherwise it defaults to the value of 'timeout http-request')
      timeout http-keep-alive 900s

      # give clients 10s to complete a request (either time between handshake and first request, or time spent sending headers)
      timeout http-request 10s

      # time out server responses after 90s
      timeout server 180s

      # allow backend sessions to be shared across frontend sessions
      http-reuse aggressive

      # limit the number of concurrent requests to each server, to stop
      # the python process having to juggle hundreds of queued
      # requests. Any requests beyond this limit are held in a queue for
      # up to <timeout-queue> seconds, before being rejected according
      # to "errorfile 503" below.
      #
      # (bear in mind that we have two haproxies, each of which will use
      # up to this number of connections, so the actual number of
      # connections to the server may be up to twice this figure.)
      #
      # Note that this is overridden for some servers and backends.
      default-server maxconn 500

      option redispatch

      compression algo gzip
      compression type text/plain text/html text/xml application/json text/css

      # Use a consistent hashing scheme so that worker with balancing going down doesn't cause
      # the traffic for all others to be shuffled around.
      hash-type consistent sdbm

    resolvers kubedns
      parse-resolv-conf
      accepted_payload_size 8192
      hold timeout 600s
      hold refused 600s

    frontend prometheus
      bind *:8405
      bind [::]:8405 v6only
      http-request use-service prometheus-exporter if { path /metrics }
      monitor-uri /haproxy_test
      no log

    frontend http-blackhole
      bind *:8009
      bind [::]:8009 v6only

      # same as http log, with %Th (handshake time)
      log-format "%ci:%cp [%tr] %ft %b/%s %Th/%TR/%Tw/%Tc/%Tr/%Ta %ST %B %CC %CS %tsc %ac/%fc/%bc/%sc/%rc %sq/%bq %hr %hs %{+Q}r"

      http-request capture hdr(host) len 32
      http-request capture req.fhdr(x-forwarded-for) len 64
      http-request capture req.fhdr(user-agent) len 200

      http-request deny content-type application/json string '{"errcode": "M_FORBIDDEN", "error": "Blocked"}'


    frontend startup
       bind *:8406
       bind [::]:8406 v6only
       acl synapse_dead nbsrv(synapse-main) lt 1

       monitor-uri   /synapse_ready
       monitor fail  if synapse_dead

    frontend synapse-http-in
      bind *:8008
      bind [::]:8008 v6only

      # if we hit the maxconn on a server, and the queue timeout expires, we want
      # to avoid returning 503, since that will cause cloudflare to mark us down.
      #
      # https://cbonte.github.io/haproxy-dconv/1.8/configuration.html#1.3.1 says:
      #
      #   503  when no server was available to handle the request, or in response to
      #        monitoring requests which match the "monitor fail" condition
      #
      errorfile 503 /synapse/429.http

      # same as http log, with %Th (handshake time)
      log-format "%ci:%cp [%tr] %ft %b/%s %Th/%TR/%Tw/%Tc/%Tr/%Ta %ST %B %CC %CS %tsc %ac/%fc/%bc/%sc/%rc %sq/%bq %hr %hs %{+Q}r"

      http-request capture hdr(host) len 32
      http-request capture req.fhdr(x-forwarded-for) len 64
      http-request capture req.fhdr(user-agent) len 200

      # Ingresses by definition run on both 80 & 443 and there's no customising of that
      # It is up to the ingress controller and any annotations provided to it whether
      # it sets any additional headers or not or whether it redirects http -> https
      # We don't have control (or even visiblity) on what the ingress controller is or does
      # So we can't guarantee the header is present
      # https is a more sensible default than http for the missing header as we force public_baseurl to https
      http-request set-header X-Forwarded-Proto https if !{ hdr(X-Forwarded-Proto) -m found }
      http-request set-var(txn.x_forwarded_proto) hdr(x-forwarded-proto)
      http-response add-header Strict-Transport-Security max-age=31536000 if { var(txn.x_forwarded_proto) -m str -i "https" }

      # If we get here then we want to proxy everything to synapse or a worker.

      # try to extract a useful access token from either the auth header or a
      # query-param
      http-request set-var(req.access_token) urlp("access_token") if { urlp("access_token") -m found }
      http-request set-var(req.access_token) req.fhdr(Authorization),word(2," ") if { hdr_beg("Authorization") -i "Bearer " }

      # We also need a http header format to allow us to loadbalance and make decisions:
      http-request set-header X-Access-Token %[var(req.access_token)]

      # Disable Google FLoC
      http-response set-header Permissions-Policy "interest-cohort=()"

      # Load the backend from one of the map files.
      acl has_get_map path -m reg -M -f /synapse/path_map_file_get

      http-request set-var(req.backend) path,map_reg(/synapse/path_map_file_get,main) if has_get_map METH_GET
      http-request set-var(req.backend) path,map_reg(/synapse/path_map_file,main) unless { var(req.backend) -m found }
      acl rendezvous path_beg /_matrix/client/unstable/org.matrix.msc4108/rendezvous
      acl rendezvous path_beg /_synapse/client/rendezvous
      use_backend return_204_rendezvous if { method OPTIONS } rendezvous
      use_backend return_204_synapse if { method OPTIONS }




      acl backend_unavailable str(),concat('synapse-',req.backend),nbsrv lt 1

      acl ess_version path /_synapse/ess/version
      use_backend ess-version-static if ess_version

      use_backend synapse-%[var(req.backend)]

    backend ess-version-static
      mode http

      # Set all the same headers as the well-knowns
      http-after-response set-header X-Frame-Options SAMEORIGIN
      http-after-response set-header X-Content-Type-Options nosniff
      http-after-response set-header X-XSS-Protection "1; mode=block"
      http-after-response set-header Content-Security-Policy "frame-ancestors 'self'"
      http-after-response set-header X-Robots-Tag "noindex, nofollow, noarchive, noimageindex"

      http-after-response set-header Access-Control-Allow-Origin *
      http-after-response set-header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
      http-after-response set-header Access-Control-Allow-Headers "X-Requested-With, Content-Type, Authorization"

      http-request return status 200 content-type "application/json" file /synapse/ess-version.json

    backend synapse-main
      default-server maxconn 250

      option httpchk
      http-check connect port 8080
      http-check send meth GET uri /health

      # Use DNS SRV service discovery on the headless service
      server-template main 1 _synapse-http._tcp.ci-matrix-umbrella-test-values-synapse-main.ci-matrix-umbrella.svc.cluster.local. resolvers kubedns init-addr none check

    # a backend which responds to everything with a 204 mirroring https://github.com/element-hq/synapse/blob/v1.124.0/synapse/http/server.py#L901-L932
    backend return_204_synapse
      http-request return status 204 hdr "Access-Control-Allow-Origin" "*" hdr "Access-Control-Allow-Methods" "GET, HEAD, POST, PUT, DELETE, OPTIONS" hdr "Access-Control-Allow-Headers" "Origin, X-Requested-With, Content-Type, Accept, Authorization, Date" hdr "Access-Control-Expose-Headers" "Synapse-Trace-Id, Server"

    backend return_204_rendezvous
      http-request return status 204 hdr "Access-Control-Allow-Origin" "*" hdr "Access-Control-Allow-Methods" "GET, HEAD, POST, PUT, DELETE, OPTIONS" hdr "Access-Control-Allow-Headers" "Origin, Content-Type, Accept, Content-Type, If-Match, If-None-Match" hdr "Access-Control-Expose-Headers" "Synapse-Trace-Id, Server, ETag"



    frontend well-known-in
      bind *:8010
      bind [::]:8010 v6only

      # same as http log, with %Th (handshake time)
      log-format "%ci:%cp [%tr] %ft %b/%s %Th/%TR/%Tw/%Tc/%Tr/%Ta %ST %B %CC %CS %tsc %ac/%fc/%bc/%sc/%rc %sq/%bq %hr %hs %{+Q}r"

      http-request capture hdr(host) len 32
      http-request capture req.fhdr(x-forwarded-for) len 64
      http-request capture req.fhdr(user-agent) len 200

      acl is_delete_put_post_method method DELETE POST PUT
      http-request deny status 405 if is_delete_put_post_method

      acl well-known path /.well-known/matrix/server
      acl well-known path /.well-known/matrix/client
      acl well-known path /.well-known/matrix/support


      http-request redirect  code 301  location https://element.ci.example.test unless well-known

      use_backend well-known-static if well-known
      default_backend well-known-no-match

    backend well-known-static
      mode http

      http-after-response set-header X-Frame-Options SAMEORIGIN
      http-after-response set-header X-Content-Type-Options nosniff
      http-after-response set-header X-XSS-Protection "1; mode=block"
      http-after-response set-header Content-Security-Policy "frame-ancestors 'self'"
      http-after-response set-header X-Robots-Tag "noindex, nofollow, noarchive, noimageindex"

      http-after-response set-header Access-Control-Allow-Origin *
      http-after-response set-header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
      http-after-response set-header Access-Control-Allow-Headers "X-Requested-With, Content-Type, Authorization"

      http-request return status 200 content-type "application/json" file "/well-known/server" if { path /.well-known/matrix/server }
      http-request return status 200 content-type "application/json" file "/well-known/client" if { path /.well-known/matrix/client }
      http-request return status 200 content-type "application/json" file "/well-known/support" if { path /.well-known/matrix/support }

    backend well-known-no-match
      mode http

      http-request deny status 404


    # a fake backend which fonxes every request with a 500. Useful for
    # handling overloads etc.
    backend return_500
      http-request deny deny_status 500

  placeholder: Ensure there's something after haproxy.cfg for https://github.com/element-hq/ess-helm/issues/821
