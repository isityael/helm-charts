---
# Source: privatebin/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-privatebin-test-values
  labels:
    helm.sh/chart: privatebin-0.1.3
    app.kubernetes.io/name: privatebin
    app.kubernetes.io/instance: ci-privatebin-test-values
    app.kubernetes.io/version: "2.0.4"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: privatebin
      app.kubernetes.io/instance: ci-privatebin-test-values
  template:
    metadata:
      labels:
        app.kubernetes.io/name: privatebin
        app.kubernetes.io/instance: ci-privatebin-test-values
    spec:
      serviceAccountName: default
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: privatebin
          image: "privatebin/nginx-fpm-alpine:2.0.4@sha256:96171f34dd07f6c655cb3a311de24c1e9bafd05307ea9b6d38443863f6b48153"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: privatebin-s3
                  key: accesskey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: privatebin-s3
                  key: secretkey
          volumeMounts:
            - name: config
              mountPath: /srv/cfg/conf.php
              subPath: conf.php
              readOnly: true
            - name: config
              mountPath: /usr/local/etc/php/conf.d/uploads.ini
              subPath: php.ini
              readOnly: true
            - name: config
              mountPath: /srv/robots.txt
              subPath: robots.txt
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            failureThreshold: 6
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 25m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: ci-privatebin-test-values-config
        - name: tmp
          emptyDir: {}

---
# Source: privatebin/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ci-privatebin-test-values
  labels:
    helm.sh/chart: privatebin-0.1.3
    app.kubernetes.io/name: privatebin
    app.kubernetes.io/instance: ci-privatebin-test-values
    app.kubernetes.io/version: "2.0.4"
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - bin.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - group: ""
          kind: Service
          name: ci-privatebin-test-values
          port: 80
          weight: 1
