---
# Source: privatebin/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ci-privatebin-test-values-config
  labels:
    helm.sh/chart: privatebin-0.1.3
    app.kubernetes.io/name: privatebin
    app.kubernetes.io/instance: ci-privatebin-test-values
    app.kubernetes.io/version: "2.0.4"
    app.kubernetes.io/managed-by: Helm
data:
  conf.php: |
    ;<?php http_response_code(403); /*
    [main]
    name = "PrivateBin"
    discussion = false
    password = true
    fileupload = true
    burnafterreadingselected = false
    defaultformatter = "plaintext"
    sizelimit = 1.6777216e+07
    template = "bootstrap5"
    qrcode = true
    email = false
    compression = "zlib"

    [expire]
    default = "1week"

    [expire_options]
    10min = 600
    1day = 86400
    1hour = 3600
    1month = 2.592e+06
    1week = 604800
    5min = 300

    [traffic]
    limit = 10

    [purge]
    limit = 300
    batchsize = 10

    [model]
    class = S3Storage

    [model_options]
    region = "us-east-1"
    version = "2006-03-01"
    endpoint = "https://s3.example.com"
    use_path_style_endpoint = true
    bucket = "privatebin"
    prefix = "privatebin"
    ; */
  php.ini: |
    upload_max_filesize = 16M
    post_max_size = 18M
    memory_limit = 32M
  robots.txt: |
    User-agent: *
    Disallow: /
    

---
# Source: privatebin/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: ci-privatebin-test-values
  labels:
    helm.sh/chart: privatebin-0.1.3
