      public_instance: false
      secret_key: "__SEARXNG_SECRET__"
    search:
      safe_search: 0
      autocomplete: "duckduckgo"
      formats:
        - html
        - json
    ui:
      default_theme: "m0sh1-dark"
      theme_args:
        simple_style: "dark"
      query_in_title: true
      infinite_scroll: false
      results_on_new_tab: true
    outgoing:
      request_timeout: 3
      max_request_timeout: 10
    valkey:
      url: "valkey://ci-searxng-test-values-valkey:6379/0"
  limiter.toml: |
    [botdetection.ip_limit]
    link_token = true
    

