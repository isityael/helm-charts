---
# Source: wakapi-dhi/templates/config-map.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: wakapi-config
  labels:
    helm.sh/chart: wakapi-dhi-1.2.20
    app.kubernetes.io/name: wakapi
    app.kubernetes.io/instance: ci-wakapi-dhi-test-values
    app.kubernetes.io/version: "2.17.4-yaelmoshi.2"
    app.kubernetes.io/managed-by: Helm
data:
  ENVIRONMENT: "production"
  WAKAPI_PORT: "3000"
  WAKAPI_LISTEN_IPV4: "0.0.0.0"
  WAKAPI_BASE_PATH: "/"
  WAKAPI_PUBLIC_URL: "https://wakapi.bogusdomain.test"
  WAKAPI_TIMEOUT_SEC: "30"
  # Database (non-sensitive)
  WAKAPI_DB_TYPE: "sqlite3"
  WAKAPI_DB_PORT: "5432"
  WAKAPI_DB_CHARSET: "utf8mb4"
  WAKAPI_DB_MAX_CONNECTIONS: "10"
  WAKAPI_DB_SSL: "false"
  # Security
  WAKAPI_ALLOW_SIGNUP: "true"
  WAKAPI_DISABLE_LOCAL_AUTH: "false"
  WAKAPI_INSECURE_COOKIES: "false"
  WAKAPI_COOKIE_MAX_AGE: "172800"
  WAKAPI_EXPOSE_METRICS: "true"
  # OIDC (non-sensitive — secrets injected separately)
  WAKAPI_OIDC_ALLOW_SIGNUP: "true"
  # Application
  WAKAPI_AGGREGATION_TIME: "02:15"
  WAKAPI_INACTIVE_DAYS: "7"
  WAKAPI_LEADERBOARD_ENABLED: "true"
  WAKAPI_DATA_RETENTION_MONTHS: "-1"
  # Mail (non-sensitive)

