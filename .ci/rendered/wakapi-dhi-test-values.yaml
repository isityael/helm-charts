# Source: wakapi-dhi/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wakapi
  labels:
    helm.sh/chart: wakapi-dhi-1.2.20
    app.kubernetes.io/name: wakapi
    app.kubernetes.io/instance: ci-wakapi-dhi-test-values
    app.kubernetes.io/version: "2.17.4-yaelmoshi.2"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wakapi
      app.kubernetes.io/instance: ci-wakapi-dhi-test-values
  template:
    metadata:
      annotations:
        checksum/config: 398740b6dcf698266d5cc02dd2b324d165bcee95e3bb8e4711ede76b61dfefde
      labels:
        app.kubernetes.io/name: wakapi
        app.kubernetes.io/instance: ci-wakapi-dhi-test-values
    spec:
      serviceAccountName: wakapi
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65532
      containers:
        - name: wakapi-dhi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          image: "ghcr.io/isityael/wakapi-dhi:2.17.4-yaelmoshi.2@sha256:21766460c7983bf53e040b895dc47365ca707b8ca2791d61569cc0b9824bcc1b"
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: wakapi-config
          env:
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: "/api/health"
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: "/api/health"
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wakapi
        - name: tmp
          emptyDir: {}

