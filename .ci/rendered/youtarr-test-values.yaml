apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: youtarr-ci-mariadb
  labels:
    helm.sh/chart: youtarr-0.1.8
    app.kubernetes.io/name: youtarr
    app.kubernetes.io/instance: ci-youtarr-test-values
    app.kubernetes.io/version: "v1.72.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: mariadb
spec:
  serviceName: youtarr-ci-mariadb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: youtarr
      app.kubernetes.io/instance: ci-youtarr-test-values
      app.kubernetes.io/component: mariadb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: youtarr
        app.kubernetes.io/instance: ci-youtarr-test-values
        app.kubernetes.io/component: mariadb
    spec:
      imagePullSecrets:
        - name: dhi-pull-secret
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mariadb
          image: "dhi.io/mariadb:12.3.2-debian13@sha256:170533219449cece2148e5d998700caf13a89fcae1367fb42964bdee2d6ef100@sha256:9378d3cd184a741d9664d37ad3bdc5729fd7131ff06bb09b7188b6df7b33b3de"
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: youtarr-ci-mariadb
                  key: mariadb-root-password
            - name: MARIADB_DATABASE
              value: "youtarr"
            - name: MARIADB_USER
              value: "youtarr"
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: youtarr-ci-mariadb
                  key: mariadb-password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 50m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: youtarr-ci-mariadb
