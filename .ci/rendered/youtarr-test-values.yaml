# Source: youtarr/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtarr-ci
  labels:
    helm.sh/chart: youtarr-0.1.8
    app.kubernetes.io/name: youtarr
    app.kubernetes.io/instance: ci-youtarr-test-values
    app.kubernetes.io/version: "v1.72.1"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: youtarr
      app.kubernetes.io/instance: ci-youtarr-test-values
  template:
    metadata:
      labels:
        app.kubernetes.io/name: youtarr
        app.kubernetes.io/instance: ci-youtarr-test-values
    spec:
      imagePullSecrets:
        - name: dhi-pull-secret
      serviceAccountName: default
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: apply-config-overrides
          image: "docker.io/dialmaster/youtarr:v1.73.0@sha256:614bbece4a8a35703fa4017bb8145e1b0328537ddd0396e2d426664b3d67bbbe"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: YOUTARR_CONFIG_OVERRIDES
              value: "{\"autoUpdateYtdlp\":true,\"ytdlpIpFamily\":\"auto\"}"
            - name: YOUTARR_CONFIG_REF_KEYS
              value: "[\"appriseUrls\",\"jellyfinApiKey\"]"
            - name: YOUTARR_CONFIG_SECRET_APPRISEURLS
              valueFrom:
                secretKeyRef:
                  name: "youtarr-notifications"
                  key: "appriseUrls"
                  optional: false
            - name: YOUTARR_CONFIG_SECRET_JELLYFINAPIKEY
              valueFrom:
                secretKeyRef:
                  name: "youtarr-jellyfin"
                  key: "api-key"
                  optional: false
          command:
            - node
            - -e
            - |
              const fs = require('fs');
              const path = '/app/config/config.json';
              const overrides = JSON.parse(process.env.YOUTARR_CONFIG_OVERRIDES || '{}');
              const secretKeys = JSON.parse(process.env.YOUTARR_CONFIG_REF_KEYS || '[]');
              for (const key of secretKeys) {
                const envName = `YOUTARR_CONFIG_SECRET_${key.toUpperCase().replace(/-/g, '_')}`;
                const rawValue = process.env[envName] || '';
                try {
                  overrides[key] = JSON.parse(rawValue);
                } catch {
                  overrides[key] = rawValue;
                }
              }
              fs.mkdirSync('/app/config', { recursive: true });
              let current = {};
              if (fs.existsSync(path)) {
                current = JSON.parse(fs.readFileSync(path, 'utf8'));
              }
              fs.writeFileSync(path, `${JSON.stringify({ ...current, ...overrides }, null, 2)}\n`);
          volumeMounts:
            - name: config
              mountPath: /app/config
      containers:
        - name: youtarr
          image: "docker.io/dialmaster/youtarr:v1.73.0@sha256:614bbece4a8a35703fa4017bb8145e1b0328537ddd0396e2d426664b3d67bbbe"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 3011
              protocol: TCP
          env:
            - name: TZ
              value: "Europe/Berlin"
            - name: YOUTARR_UID
              value: "1000"
            - name: YOUTARR_GID
              value: "1000"
            - name: LOG_LEVEL
              value: "info"
            - name: AUTH_ENABLED
              value: "true"
            - name: DB_HOST
              value: "youtarr-ci-mariadb"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "youtarr"
            - name: DB_NAME
              value: "youtarr"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: youtarr-ci-mariadb
                  key: mariadb-password
            - name: YOUTUBE_OUTPUT_DIR
              value: /usr/src/app/data
            - name: TRUST_PROXY
              value: "1"
            - name: AUTH_PRESET_USERNAME
              valueFrom:
                secretKeyRef:
                  name: youtarr-auth
                  key: username
            - name: AUTH_PRESET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: youtarr-auth
                  key: password
          volumeMounts:
            - name: downloads
              mountPath: /usr/src/app/data
            - name: config
              mountPath: /app/config
            - name: cookies
              mountPath: "/app/config/cookies.user.txt"
              subPath: "cookies.user.txt"
              readOnly: true
            - name: jobs
              mountPath: /app/jobs
            - name: images
              mountPath: /app/server/images
          livenessProbe:
            failureThreshold: 6
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: downloads
          hostPath:
            path: "/data/youtarr"
            type: "DirectoryOrCreate"
        - name: config
          persistentVolumeClaim:
            claimName: youtarr-ci-config
        - name: cookies
          secret:
            secretName: "youtarr-cookies"
            items:
              - key: "cookies.user.txt"
                path: "cookies.user.txt"
        - name: jobs
          persistentVolumeClaim:
            claimName: youtarr-ci-jobs
        - name: images
          persistentVolumeClaim:
            claimName: youtarr-ci-images

