name: Release Charts

concurrency: chart-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'charts/**'

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Add dependency repos
        run: |
          set -euo pipefail
          repos=$(
            grep -R --no-filename -E '^[[:space:]]*repository:[[:space:]]+https?://' charts/*/Chart.yaml \
              | awk '{print $2}' | sort -u || true
          )
          if [ -z "${repos}" ]; then
            echo "No http(s) chart repositories found in Chart.yaml dependencies."
            exit 0
          fi
          i=0
          for repo in $repos; do
            name="repo-${i}"
            echo "Adding Helm repo: ${name} -> ${repo}"
            helm repo add "${name}" "${repo}"
            i=$((i + 1))
          done
          helm repo update

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: "true"

      - name: Push charts to GHCR OCI
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          for chart in charts/*/; do
            [ -f "${chart}Chart.yaml" ] || continue
            name="$(basename "$chart")"
            version="$(grep '^version:' "${chart}Chart.yaml" | awk '{print $2}')"
            # Check if this version already exists on GHCR
            if helm show chart "oci://ghcr.io/sm-moshi/charts/${name}" --version "${version}" >/dev/null 2>&1; then
              echo "SKIP ${name}:${version} (already on GHCR)"
              continue
            fi
            echo "Packaging and pushing ${name}:${version}..."
            pkg="$(helm package "$chart" -d /tmp/helm-oci/ 2>&1 | awk '{print $NF}')"
            helm push "$pkg" oci://ghcr.io/sm-moshi/charts
          done

      - name: Checkout gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Sync Artifact Hub metadata
        run: |
          set -euo pipefail
          if [ ! -f artifacthub-repo.yml ]; then
            echo "No artifacthub-repo.yml found. Skipping."
            exit 0
          fi

          cp artifacthub-repo.yml gh-pages/artifacthub-repo.yml
          cd gh-pages
          if git diff --quiet -- artifacthub-repo.yml; then
            echo "artifacthub-repo.yml is up to date."
            exit 0
          fi

          git add artifacthub-repo.yml
          git commit -m "chore: sync artifacthub metadata"
          git push origin gh-pages
