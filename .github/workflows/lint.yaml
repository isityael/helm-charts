name: lint

on:
  pull_request:
    paths:
      - ".ci/**"
      - ".github/workflows/lint.yaml"
      - "charts/**"
      - "renovate.json"
      - ".yamllint.yml"
  push:
    branches:
      - main
    paths:
      - ".ci/**"
      - ".github/workflows/lint.yaml"
      - "charts/**"
      - "renovate.json"
      - ".yamllint.yml"

permissions:
  contents: read

jobs:
  chart-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Login to DHI registry
        if: ${{ secrets.DHI_USERNAME != '' && secrets.DHI_PASSWORD != '' }}
        run: |
          printf '%s\n' "${DHI_PASSWORD}" |
            helm registry login dhi.io -u "${DHI_USERNAME}" --password-stdin
        env:
          DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
          DHI_PASSWORD: ${{ secrets.DHI_PASSWORD }}

      - name: Lint changed charts
        run: ct lint --config .ci/ct.yaml

      - name: Render CI values
        run: |
          set -euo pipefail
          for chart in charts/*; do
            [ -f "${chart}/Chart.yaml" ] || continue
            name="$(basename "${chart}")"
            if [ -f "${chart}/ci/test-values.yaml" ]; then
              helm template "ci-${name}" "${chart}" \
                --namespace "ci-${name}" \
                -f "${chart}/ci/test-values.yaml" >/dev/null
            else
              helm template "ci-${name}" "${chart}" --namespace "ci-${name}" >/dev/null
            fi
          done
