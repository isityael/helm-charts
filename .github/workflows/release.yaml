name: release

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - ".ci/publish-oci.sh"
      - ".github/workflows/release.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-oci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Publish charts
        run: .ci/publish-oci.sh
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
          DHI_PASSWORD: ${{ secrets.DHI_PASSWORD }}
