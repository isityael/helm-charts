# helm-charts — CI: lint all charts
# Triggers on push to main and pull requests (GitHub forge).
# OCI publishing is handled by release-all.yaml (push to charts/**).
# Per-chart GitHub Releases are created by tag-triggered pipelines
# (release.yaml, release-basic-memory.yaml, release-nfs-csi.yaml).
when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: chart-version-guard
    image: ghcr.io/yaelmoshi/chart-version-guard:main@sha256:67427f5e9321deff52ad83cd67aea7dcdb092b34cff8c324db2a77e963d66ec2
    commands:
      - chart-version-guard check --ci woodpecker --repo .

  - name: helm-lint
    image: dhi.io/helm:4.2.0-debian13-dev@sha256:2d3e501f60d564a46a37320c75e15e20481bd38d879066468e4daf5d48b4ebe2
    environment:
      DHI_USERNAME:
        from_secret: dhi_username
      DHI_PASSWORD:
        from_secret: dhi_password
    commands:
      - |
        # Add dependency repos
        for chart in charts/*/; do
          [ -f "$chart/Chart.yaml" ] || continue
          grep -E '^\s*repository:\s+https?://' "$chart/Chart.yaml" 2>/dev/null | awk '{print $2}' || true
        done | sort -u | while read -r repo; do
          [ -n "$repo" ] || continue
          name="repo-$(echo "$repo" | md5sum | cut -c1-8)"
          helm repo add "$name" "$repo" 2>/dev/null || true
        done
      - |
        if grep -RqsE '^\s*repository:\s+oci://dhi\.io' charts/*/Chart.yaml; then
          if [ -n "${DHI_USERNAME:-}" ] && [ -n "${DHI_PASSWORD:-}" ]; then
            printf '%s\n' "$DHI_PASSWORD" | helm registry login dhi.io -u "$DHI_USERNAME" --password-stdin
          else
            echo "WARNING: DHI credentials not available;"
            echo "charts with oci://dhi.io dependencies may lint without subcharts."
          fi
        fi
      - |
        for chart in charts/*/; do
          echo "==> Linting $chart"
          if ! helm dependency build "$chart"; then
            echo "WARNING: dependency build failed for $chart; linting without subcharts."
            helm lint "$chart"
            continue
          fi
          helm lint --with-subcharts "$chart"
        done
      - |
        rm -rf .ci/rendered
        mkdir -p .ci/rendered
        for chart in charts/*/; do
          [ -f "$chart/Chart.yaml" ] || continue
          name="$(basename "$chart")"
          if [ -f "$chart/ci/test-values.yaml" ]; then
            echo "==> Rendering $chart with ci/test-values.yaml"
            helm template "ci-$name" "$chart" \
              --namespace "ci-$name" \
              -f "$chart/ci/test-values.yaml" > ".ci/rendered/$name.yaml"
          else
            echo "==> Rendering $chart with default values"
            helm template "ci-$name" "$chart" --namespace "ci-$name" > ".ci/rendered/$name.yaml"
          fi
        done

  - name: kubeconform
    image: ghcr.io/yannh/kubeconform:v0.7.0-alpine@sha256:8f0eeaaa96ba27ba1500b0e4b1c215acc358d159c62a7ecae58d7a03403287b0
    commands:
      - /kubeconform -ignore-missing-schemas -summary .ci/rendered/*.yaml
      - rm -rf .ci/rendered
