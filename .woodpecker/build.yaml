# helm-charts — CI: lint all charts
# Triggers on push to main and pull requests (GitHub forge).
# OCI publishing is handled by release-all.yaml (push to charts/**).
# Per-chart GitHub Releases are created by tag-triggered pipelines
# (release.yaml, release-basic-memory.yaml, release-csi-s3.yaml, release-nfs-csi.yaml).
when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: chart-version-bump
    image: ghcr.io/isityael/chart-version-guard:a5263c4c@sha256:67427f5e9321deff52ad83cd67aea7dcdb092b34cff8c324db2a77e963d66ec2
    commands:
      - chart-version-guard bump --ci woodpecker --repo . --write
      - |
        if ! git diff --quiet -- 'charts/*/Chart.yaml'; then
          echo "Chart versions were patch-bumped by CI. Commit the generated diff:"
          git diff -- 'charts/*/Chart.yaml'
          exit 1
        fi

  - name: chart-version-guard
    image: ghcr.io/isityael/chart-version-guard:a5263c4c@sha256:67427f5e9321deff52ad83cd67aea7dcdb092b34cff8c324db2a77e963d66ec2
    commands:
      - chart-version-guard check --ci woodpecker --repo .

  - name: helm-lint-pr
    image: dhi.io/helm:4.2.0-debian13-dev@sha256:2d3e501f60d564a46a37320c75e15e20481bd38d879066468e4daf5d48b4ebe2
    commands:
      - bash .ci/woodpecker-helm-lint.sh
    when:
      - event: pull_request

  - name: helm-lint
    image: dhi.io/helm:4.2.0-debian13-dev@sha256:2d3e501f60d564a46a37320c75e15e20481bd38d879066468e4daf5d48b4ebe2
    environment:
      DHI_USERNAME:
        from_secret: dhi_username
      DHI_PASSWORD:
        from_secret: dhi_password
    commands:
      - bash .ci/woodpecker-helm-lint.sh
    when:
      - event: push
        branch: main

  - name: kubeconform
    image: ghcr.io/yannh/kubeconform:v0.7.0-alpine@sha256:8f0eeaaa96ba27ba1500b0e4b1c215acc358d159c62a7ecae58d7a03403287b0
    commands:
      - /kubeconform -ignore-missing-schemas -summary .ci/rendered/*.yaml

  - name: kube-linter
    image: alpine:3.22@sha256:310c62b5e7ca5b08167e4384c68db0fd2905dd9c7493756d356e893909057601
    commands:
      - |
        case "$(uname -m)" in
          x86_64) kube_linter_asset="kube-linter-linux.tar.gz" ;;
          aarch64|arm64) kube_linter_asset="kube-linter-linux_arm64.tar.gz" ;;
          *)
            echo "Unsupported runner architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac
        kube_linter_url="https://github.com/stackrox/kube-linter/releases/download/v0.8.3/$kube_linter_asset"
        wget -qO /tmp/kube-linter.tar.gz "$kube_linter_url"
        tar -xzf /tmp/kube-linter.tar.gz -C /tmp kube-linter
        chmod +x /tmp/kube-linter
        /tmp/kube-linter version
        for manifest in .ci/rendered/*.yaml; do
          echo "==> kube-linter $manifest"
          /tmp/kube-linter lint "$manifest" --config .kube-linter.yaml
        done

  - name: cleanup-rendered
    image: dhi.io/helm:4.2.0-debian13-dev@sha256:2d3e501f60d564a46a37320c75e15e20481bd38d879066468e4daf5d48b4ebe2
    commands:
      - rm -rf .ci/rendered
