# helm-charts — Publish all charts to GHCR OCI
#
# Triggered on push to main when charts/ change, or manually.
# Packages each chart and pushes to oci://ghcr.io/yaelmoshi/charts,
# skipping versions that already exist.
#
# Script is in .ci/publish-oci.sh to avoid Woodpecker's ${VAR}
# pre-processing which strips shell-local variable expansions.
when:
  - event: manual
  - event: push
    branch: main
    path: "charts/**"

steps:
  - name: publish-oci
    image: dhi.io/helm:4.2.0-debian13-dev@sha256:2d3e501f60d564a46a37320c75e15e20481bd38d879066468e4daf5d48b4ebe2
    environment:
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_TOKEN:
        from_secret: github_token
      COSIGN_PRIVATE_KEY:
        from_secret: cosign_private_key
      COSIGN_PASSWORD:
        from_secret: cosign_password
      DHI_USERNAME:
        from_secret: dhi_username
      DHI_PASSWORD:
        from_secret: dhi_password
    commands:
      - bash .ci/publish-oci.sh
