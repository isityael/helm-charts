# helm-charts — Publish all charts to GHCR OCI
#
# Triggered on push to main when charts/ change, or manually.
# Packages each chart and pushes to oci://ghcr.io/sm-moshi/charts,
# skipping versions that already exist.
#
# Script is in .ci/publish-oci.sh to avoid Woodpecker's ${VAR}
# pre-processing which strips shell-local variable expansions.
when:
  - event: manual
  - event: push
    branch: main
    path: "charts/**"

steps:
  - name: publish-oci
    image: dhi.io/helm:4.1.3-debian13-dev@sha256:0e15ecf570c1d5e2348d934b5ea4c41134d641e7ae43831b84e774b73cfdb88b
    environment:
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - bash .ci/publish-oci.sh
