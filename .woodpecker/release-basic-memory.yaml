# helm-charts — Release: package + publish OCI chart to GHCR + GitHub Release
#
# Triggered by version tags (basic-memory-v*). Packages the chart, pushes
# the OCI artifact to ghcr.io/sm-moshi/charts, and creates a GitHub release.
#
# NOTE: the generic .woodpecker/release-all.yaml pipeline also publishes
# this chart on every push to main that touches charts/**. This tag-
# triggered pipeline exists so version bumps get a matching GitHub Release
# with the packaged .tgz attached.
when:
  - event: tag
    ref: refs/tags/basic-memory-v*

steps:
  - name: helm-lint
    image: dhi.io/helm:4.1.3-debian13-dev@sha256:0e15ecf570c1d5e2348d934b5ea4c41134d641e7ae43831b84e774b73cfdb88b
    commands:
      - helm lint charts/basic-memory

  - name: helm-package
    image: dhi.io/helm:4.1.3-debian13-dev@sha256:0e15ecf570c1d5e2348d934b5ea4c41134d641e7ae43831b84e774b73cfdb88b
    environment:
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - helm package charts/basic-memory
      - helm registry login ghcr.io -u "$GHCR_USERNAME" -p "$GHCR_TOKEN"
      - helm push basic-memory-*.tgz oci://ghcr.io/sm-moshi/charts

  - name: github-release
    image: woodpeckerci/plugin-release@sha256:caf18bc34de626dff1de0cc0638ee8dff11af6c9372a5f3d79ab27b91a5ee4d9
    settings:
      api_key:
        from_secret: github_token
      base_url: https://api.github.com
      files:
        - "basic-memory-*.tgz"
      checksum:
        - sha256
      title: "${CI_COMMIT_TAG}"
      note: "auto"
      draft: false
