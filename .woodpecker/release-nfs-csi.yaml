# helm-charts — Release: package + publish csi-driver-nfs OCI chart
#
# Triggered by version tags (csi-driver-nfs-v*). Packages the chart, pushes
# the OCI artifact to ghcr.io/yaelmoshi/charts, and creates a GitHub release.
when:
  - event: tag
    ref: refs/tags/csi-driver-nfs-v*

steps:
  - name: helm-lint
    image: dhi.io/helm:4.1.3-debian13-dev@sha256:0e15ecf570c1d5e2348d934b5ea4c41134d641e7ae43831b84e774b73cfdb88b
    commands:
      - helm lint charts/csi-driver-nfs

  - name: helm-package
    image: dhi.io/helm:4.1.3-debian13-dev@sha256:0e15ecf570c1d5e2348d934b5ea4c41134d641e7ae43831b84e774b73cfdb88b
    environment:
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - helm package charts/csi-driver-nfs
      - helm registry login ghcr.io -u "$GHCR_USERNAME" -p "$GHCR_TOKEN"
      - helm push csi-driver-nfs-*.tgz oci://ghcr.io/yaelmoshi/charts

  - name: github-release
    image: woodpeckerci/plugin-release@sha256:caf18bc34de626dff1de0cc0638ee8dff11af6c9372a5f3d79ab27b91a5ee4d9
    settings:
      api_key:
        from_secret: github_token
      base_url: https://api.github.com
      files:
        - "csi-driver-nfs-*.tgz"
      checksum:
        - sha256
      title: "${CI_COMMIT_TAG}"
      note: "auto"
      draft: false
