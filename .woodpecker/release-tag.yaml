# helm-charts - create a GitHub Release from an existing OCI chart
#
# Tags must be <chart>-v<Chart.yaml version>. OCI publication remains owned by
# release-all.yaml; this pipeline only pulls the exact published version.
when:
  - event: tag
    ref: refs/tags/*-v*

steps:
  - name: pull-existing-oci
    image: dhi.io/helm:4.2.0-debian13-dev@sha256:2d3e501f60d564a46a37320c75e15e20481bd38d879066468e4daf5d48b4ebe2
    environment:
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - bash .ci/release-tag.sh

  - name: github-release
    image: woodpeckerci/plugin-release@sha256:caf18bc34de626dff1de0cc0638ee8dff11af6c9372a5f3d79ab27b91a5ee4d9
    settings:
      api_key:
        from_secret: github_token
      base_url: https://api.github.com
      files:
        - "release-artifacts/*.tgz"
      checksum:
        - sha256
      title: "${CI_COMMIT_TAG}"
      note: "auto"
      draft: false
