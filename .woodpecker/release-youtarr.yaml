# helm-charts — Release: package + publish Youtarr OCI chart to GHCR + GitHub Release
#
# Triggered by version tags (youtarr-v*). The generic release-all pipeline also
# publishes changed charts on push to main.
when:
  - event: tag
    ref: refs/tags/youtarr-v*

steps:
  - name: helm-lint
    image: dhi.io/helm:4.2.0-debian13-dev@sha256:2d3e501f60d564a46a37320c75e15e20481bd38d879066468e4daf5d48b4ebe2
    commands:
      - helm lint charts/youtarr

  - name: helm-package
    image: dhi.io/helm:4.2.0-debian13-dev@sha256:2d3e501f60d564a46a37320c75e15e20481bd38d879066468e4daf5d48b4ebe2
    environment:
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - helm package charts/youtarr
      - printf '%s\n' "$GHCR_TOKEN" | helm registry login ghcr.io -u "$GHCR_USERNAME" --password-stdin
      - helm push youtarr-*.tgz oci://ghcr.io/isityael/charts

  - name: github-release
    image: woodpeckerci/plugin-release@sha256:caf18bc34de626dff1de0cc0638ee8dff11af6c9372a5f3d79ab27b91a5ee4d9
    settings:
      api_key:
        from_secret: github_token
      base_url: https://api.github.com
      files:
        - "youtarr-*.tgz"
      checksum:
        - sha256
      title: "${CI_COMMIT_TAG}"
      note: "auto"
      draft: false
