# Wakapi — patched image with zoneinfo directory permission fix
# Pushes to: ghcr.io/sm-moshi/wakapi
# Fix: muety/wakapi#923 (merged to main, not yet released as v2.17.3)
when:
  - event: manual
  - event: push
    branch: main
    path: "charts/wakapi/docker/**"

steps:
  - name: build-and-push-ghcr
    image: woodpeckerci/plugin-docker-buildx:6.0.4@sha256:765ebfaa6f71383197babb2352c7902bafe141e6232a62cafb740510a788c550
    privileged: true
    settings:
      registry: ghcr.io
      repo: ghcr.io/sm-moshi/wakapi
      dockerfile: charts/wakapi/docker/Dockerfile
      context: charts/wakapi/docker
      platforms: linux/amd64,linux/arm64
      tags:
        - "2.17.2-patched"
        - latest
      logins:
        - registry: ghcr.io
          username: sm-moshi
          password:
            from_secret: github_token
      provenance: mode=max
      buildkit_driveropt: network=host
