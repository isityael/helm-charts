# Default values for argus (Release-Argus).

replicaCount: 1

image:
  repository: releaseargus/argus
  tag: "0.29.4@sha256:298e4013da168aef9087cb1dafe7c0ef48386e7b13d561c726514451307322b9"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

containerPort: 8080

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: argus.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  # HTTPRoute path matches reuse ingress.hosts[*].paths.
  parentRefs: []
    # - group: gateway.networking.k8s.io
    #   kind: Gateway
    #   name: traefik-gateway
    #   namespace: traefik
    #   sectionName: websecure
  hostnames: []

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL

env: []
envFrom: []

livenessProbe:
  httpGet:
    path: /api/v1/healthcheck
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/healthcheck
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

config:
  useExistingConfigMap: ""
  filename: config.yml
  mountPath: /config
  # Optional: load the service block from a separate file/string
  # Use --set-file config.serviceFromFile=path/to/services.yaml
  serviceFromFile: ""
  autoIcons:
    enabled: false
    github: true
    webFavicon: true
  data:
    settings:
      web:
        listen_addr: 0.0.0.0
        listen_port: 8080
    service: {}
  raw: ""

secret:
  create: false
  name: ""
  existingSecret: ""
  envFrom: false
  annotations: {}
  labels: {}
  type: Opaque
  stringData: {}
  data: {}

nodeSelector: {}
tolerations: []
affinity: {}

imagePullSecrets: []
