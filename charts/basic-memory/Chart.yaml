apiVersion: v2
name: basic-memory
description: |
  Helm chart for Basic Memory — a local-first knowledge graph MCP server that
  lets LLMs like Claude create, read and update notes in a human-readable
  Markdown filesystem. Ships with opt-in profiles for an MCP JSON-RPC
  compatibility shim and Obsidian LiveSync integration via CouchDB.
home: https://memory.basicmachines.co
icon: https://avatars.githubusercontent.com/u/180160560
type: application
version: 0.3.38
appVersion: "0.22.1"
kubeVersion: ">=1.28.0-0"
maintainers:
  - name: m0sh1
    email: yael@m0sh1.cc
    url: https://github.com/isityael
sources:
  - https://github.com/basicmachines-co/basic-memory
  - https://github.com/isityael/helm-charts
  - https://github.com/isityael/livesync-bridge
keywords:
  - basic-memory
  - mcp
  - model-context-protocol
  - knowledge-base
  - notes
  - markdown
  - obsidian
  - ai
  - llm
  - claude
annotations:
  category: AI
  licenses: AGPL-3.0-or-later
  artifacthub.io/license: AGPL-3.0-or-later
  artifacthub.io/links: |
    - name: Basic Memory docs
      url: https://memory.basicmachines.co
    - name: Basic Memory source
      url: https://github.com/basicmachines-co/basic-memory
    - name: Chart source
      url: https://github.com/isityael/helm-charts/tree/main/charts/basic-memory
  artifacthub.io/changes: |
    - kind: fixed
      description: Persist LiveSync checkpoints on the Basic Memory data PVC and expose configurable health probes.
    - kind: security
      description: Enforce LiveSync path exclusions on both CouchDB and filesystem peers.
    - kind: security
      description: Disable CouchDB CORS by default and reject credentialed wildcard origins.
