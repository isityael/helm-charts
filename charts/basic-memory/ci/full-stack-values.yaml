# Render-only CI coverage for the complete Basic Memory deployment profile.
# It exercises the persistence, Secret-reference and LiveSync health contracts
# without requiring a CI cluster to provision a PVC or create credentials.

persistence:
  enabled: true
  storageClass: ci-storage
  size: 5Gi

basicMemoryHome:
  enabled: true
  storageClass: ci-storage

mcpShim:
  enabled: true
  policy:
    allowedNoteDirs:
      - ci-test
    allowDeleteNote: false

obsidianSync:
  enabled: true
  couchdb:
    existingSecret:
      name: basic-memory-couchdb
      userKey: COUCHDB_USER
      passwordKey: COUCHDB_PASSWORD
    persistence:
      storageClass: ci-storage
      size: 2Gi
  livesync:
    existingSecret:
      name: basic-memory-livesync
      passphraseKey: passphrase
    state:
      dir: /app/data/.livesync-state
    health:
      port: 8080
    probes:
      startup:
        initialDelaySeconds: 0
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 180
      readiness:
        initialDelaySeconds: 0
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 3
      liveness:
        initialDelaySeconds: 0
        periodSeconds: 15
        timeoutSeconds: 3
        failureThreshold: 3
