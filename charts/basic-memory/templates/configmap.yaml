apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "basic-memory.fullname" . }}-config
  labels:
    {{- include "basic-memory.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "projects": {
        {{ .Values.env.BASIC_MEMORY_DEFAULT_PROJECT | default "main" | quote }}: {
          "path": {{ .Values.env.BASIC_MEMORY_HOME | default "/app/data/basic-memory" | quote }},
          "mode": "local"
        }
      },
      "default_project": {{ .Values.env.BASIC_MEMORY_DEFAULT_PROJECT | default "main" | quote }}
    }
{{- if .Values.mcpShim.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "basic-memory.fullname" . }}-mcp-shim
  labels:
    {{- include "basic-memory.labels" . | nindent 4 }}
data:
  shim.ts: |
    // MCP JSON-RPC shim.
    //
    // Some MCP clients incorrectly omit `jsonrpc: "2.0"` in requests.
    // FastMCP rejects those requests with HTTP 400. This proxy normalizes the
    // request body (injects `jsonrpc`) and forwards to the upstream Basic Memory
    // server, preserving streaming (SSE) responses.
    //
    // Deployed as a sidecar container and exposed via the Service.
    const upstreamPort = Number(Deno.env.get("MCP_SHIM_UPSTREAM_PORT") ?? "8001");
    const upstreamBase = `http://127.0.0.1:${upstreamPort}`;
    const listenPort = Number(Deno.env.get("MCP_SHIM_LISTEN_PORT") ?? "8000");

    const CLIENT_COOKIE = "mcp_shim_client";
    const clientToUpstreamSession = new Map<string, string>();

    // Optional policy enforcement to keep Basic Memory organized and prevent
    // accidental destructive operations from automated clients.
    const ALLOWED_NOTE_DIRS = (Deno.env.get("MCP_SHIM_ALLOWED_NOTE_DIRS") ?? "")
      .split(",").map((s) => s.trim()).filter(Boolean);
    const ALLOW_DELETE_NOTE = (Deno.env.get("MCP_SHIM_ALLOW_DELETE_NOTE") ?? "false").toLowerCase() === "true";
    const DEFAULT_PROJECT = (Deno.env.get("MCP_SHIM_DEFAULT_PROJECT") ?? "main").trim();
    const parsedToolConcurrency = Number(Deno.env.get("MCP_SHIM_MAX_TOOL_CALL_CONCURRENCY") ?? "4");
    const MAX_TOOL_CALL_CONCURRENCY = Number.isFinite(parsedToolConcurrency) && parsedToolConcurrency > 0
      ? Math.floor(parsedToolConcurrency)
      : 4;
    const parsedQueueTimeoutMs = Number(Deno.env.get("MCP_SHIM_TOOL_CALL_QUEUE_TIMEOUT_MS") ?? "12000");
    const TOOL_CALL_QUEUE_TIMEOUT_MS = Number.isFinite(parsedQueueTimeoutMs) && parsedQueueTimeoutMs > 0
      ? Math.floor(parsedQueueTimeoutMs)
      : 12000;
    const parsedUpstreamTimeoutMs = Number(Deno.env.get("MCP_SHIM_UPSTREAM_TIMEOUT_MS") ?? "45000");
    const UPSTREAM_TIMEOUT_MS = Number.isFinite(parsedUpstreamTimeoutMs) && parsedUpstreamTimeoutMs > 0
      ? Math.floor(parsedUpstreamTimeoutMs)
      : 45000;
    const THROTTLED_TOOLS = new Set(
      (Deno.env.get("MCP_SHIM_THROTTLED_TOOLS") ?? "write_note,edit_note,move_note,delete_note")
        .split(",")
        .map((s) => s.trim())
        .filter(Boolean),
    );
    let activeToolCalls = 0;
    const toolCallWaiters: Array<() => void> = [];

    // Basic Memory tools frequently require a project context. Some MCP clients omit
    // `project` even when the tool schema allows it. To make the endpoint resilient,
    // we inject a default project only for tools known to accept the `project` argument.
    // NOTE: `search` and `fetch` must NOT receive `project` (ChatGPT compatibility tools).
    const PROJECT_AWARE_TOOLS = new Set([
      "search_notes",
      "read_note",
      "view_note",
      "write_note",
      "edit_note",
      "move_note",
      "delete_note",
      "read_content",
      "recent_activity",
      "list_directory",
    ]);

    async function acquireToolCallSlot(timeoutMs: number): Promise<() => void> {
      if (activeToolCalls < MAX_TOOL_CALL_CONCURRENCY) {
        activeToolCalls += 1;
        return releaseToolCallSlot;
      }
      await new Promise<void>((resolve, reject) => {
        const timer = setTimeout(() => {
          const idx = toolCallWaiters.indexOf(onReady);
          if (idx >= 0) toolCallWaiters.splice(idx, 1);
          reject(new Error("tool queue timeout"));
        }, timeoutMs);
        const onReady = () => { clearTimeout(timer); resolve(); };
        toolCallWaiters.push(onReady);
      });
      activeToolCalls += 1;
      return releaseToolCallSlot;
    }

    function releaseToolCallSlot(): void {
      if (activeToolCalls > 0) activeToolCalls -= 1;
      const waiter = toolCallWaiters.shift();
      if (waiter) waiter();
    }

    function isObject(x: unknown): x is Record<string, unknown> {
      return typeof x === "object" && x !== null && !Array.isArray(x);
    }

    function jsonRpcError(id: unknown, code: number, message: string, data?: unknown): string {
      return JSON.stringify({
        jsonrpc: "2.0",
        id: (typeof id === "string" || typeof id === "number") ? id : null,
        error: { code, message, ...(data === undefined ? {} : { data }) },
      });
    }

    function normalizeDir(dir: unknown): string {
      if (typeof dir !== "string") return "";
      return dir.trim().replace(/^\/+/, "").replace(/\/+$/, "");
    }

    function isAllowedDir(dir: string): boolean {
      if (!dir) return false;
      if (dir.includes("..") || dir.startsWith(".")) return false;
      if (ALLOWED_NOTE_DIRS.length === 0) return true; // empty allowlist = allow all
      return ALLOWED_NOTE_DIRS.includes(dir.split("/")[0]);
    }

    function parseCookies(header: string | null): Record<string, string> {
      if (!header) return {};
      const out: Record<string, string> = {};
      for (const part of header.split(";")) {
        const [k, ...rest] = part.trim().split("=");
        if (!k) continue;
        out[k] = rest.join("=") ?? "";
      }
      return out;
    }

    function randomId(): string { return crypto.randomUUID(); }

    function normalizeJsonRpc(body: unknown): unknown {
      if (!isObject(body)) return body;
      if (!("jsonrpc" in body) && ("method" in body || "id" in body)) {
        return { jsonrpc: "2.0", ...body };
      }
      if (
        !("jsonrpc" in body) &&
        ("protocolVersion" in body || "clientInfo" in body || "capabilities" in body)
      ) {
        const id = typeof body.id === "number" || typeof body.id === "string" ? body.id : 1;
        return { jsonrpc: "2.0", id, method: "initialize", params: body };
      }
      return body;
    }

    async function fetchWithTimeout(input: URL | string, init: RequestInit): Promise<Response> {
      return await fetch(input, { ...init, signal: AbortSignal.timeout(UPSTREAM_TIMEOUT_MS) });
    }

    async function ensureUpstreamSessionId(clientId: string): Promise<string> {
      const existing = clientToUpstreamSession.get(clientId);
      if (existing) return existing;
      const initBody = JSON.stringify({
        jsonrpc: "2.0",
        id: 1,
        method: "initialize",
        params: {
          protocolVersion: "2024-11-05",
          clientInfo: { name: "mcp-shim", version: "0.1" },
          capabilities: {},
        },
      });
      const resp = await fetchWithTimeout(`${upstreamBase}/mcp`, {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "accept": "application/json, text/event-stream",
        },
        body: initBody,
      });
      const sid = resp.headers.get("mcp-session-id");
      try { await resp.arrayBuffer(); } catch { /* ignore */ }
      if (!sid) throw new Error("Upstream did not return mcp-session-id");
      clientToUpstreamSession.set(clientId, sid);
      return sid;
    }

    Deno.serve({ hostname: "0.0.0.0", port: listenPort }, async (req) => {
      const url = new URL(req.url);
      const upstreamUrl = new URL(upstreamBase);
      upstreamUrl.pathname = url.pathname;
      upstreamUrl.search = url.search;

      const headers = new Headers(req.headers);
      headers.delete("host");
      headers.delete("content-length");

      const cookies = parseCookies(req.headers.get("cookie"));
      const clientId = cookies[CLIENT_COOKIE] || randomId();
      const setCookie = cookies[CLIENT_COOKIE]
        ? null
        : `${CLIENT_COOKIE}=${clientId}; Path=/; HttpOnly; SameSite=Lax`;

      if (url.pathname === "/mcp") {
        const hasSid = req.headers.has("mcp-session-id");
        console.log(`[mcp-shim] ${req.method} /mcp hasSessionId=${hasSid} ua=${req.headers.get("user-agent") ?? ""}`);
      }

      if (url.pathname === "/mcp" && req.method !== "POST") {
        try {
          const sid = await ensureUpstreamSessionId(clientId);
          headers.set("mcp-session-id", sid);
        } catch (e) {
          console.error(`[mcp-shim] failed to ensure upstream session id: ${String(e)}`);
        }
      }

      if (req.method === "POST" && url.pathname === "/mcp") {
        const raw = await req.text();
        let releaseToolCall: (() => void) | null = null;
        try {
          const parsed = raw.length ? JSON.parse(raw) : null;
          const normalized = normalizeJsonRpc(parsed);
          if (isObject(normalized)) {
            const method = typeof normalized.method === "string" ? normalized.method : "";
            console.log(`[mcp-shim] POST /mcp normalizedMethod=${method} jsonrpc=${String(normalized.jsonrpc ?? "")}`);

            if (method === "tools/call" && isObject(normalized.params)) {
              const toolName = typeof normalized.params.name === "string" ? normalized.params.name : "";
              const args = isObject(normalized.params.arguments) ? normalized.params.arguments : null;
              const shouldThrottle = THROTTLED_TOOLS.has(toolName);

              if (shouldThrottle) {
                try {
                  releaseToolCall = await acquireToolCallSlot(TOOL_CALL_QUEUE_TIMEOUT_MS);
                } catch {
                  const err = jsonRpcError(
                    normalized.id,
                    -32004,
                    `Busy: too many concurrent ${toolName} requests. Try again in a few seconds.`,
                    { queueTimeoutMs: TOOL_CALL_QUEUE_TIMEOUT_MS, throttledTools: Array.from(THROTTLED_TOOLS) },
                  );
                  return new Response(err, { status: 200, headers: { "content-type": "application/json" } });
                }
              }

              if (args && PROJECT_AWARE_TOOLS.has(toolName)) {
                if (!("project" in args) || typeof args.project !== "string" || args.project.trim() === "") {
                  (args as Record<string, unknown>).project = DEFAULT_PROJECT;
                }
              }

              if (toolName === "delete_note" && !ALLOW_DELETE_NOTE) {
                const err = jsonRpcError(
                  normalized.id,
                  -32001,
                  "delete_note is disabled by policy (ask a human before deleting from Basic Memory).",
                  { allowDeleteEnv: "MCP_SHIM_ALLOW_DELETE_NOTE=true" },
                );
                return new Response(err, { status: 200, headers: { "content-type": "application/json" } });
              }

              if (toolName === "write_note" && args) {
                const dir = normalizeDir(args.directory);
                if (!isAllowedDir(dir)) {
                  const err = jsonRpcError(
                    normalized.id,
                    -32002,
                    `write_note blocked: directory "${dir}" is not allowed. Allowed: ${ALLOWED_NOTE_DIRS.join(", ") || "(none — allowlist is empty)"}.`,
                    { allowed: ALLOWED_NOTE_DIRS },
                  );
                  return new Response(err, { status: 200, headers: { "content-type": "application/json" } });
                }
              }

              if (toolName === "move_note" && args) {
                const dest = normalizeDir(args.destination_path || args.destination_folder);
                const top = dest.split("/")[0] ?? "";
                if (!isAllowedDir(top)) {
                  const err = jsonRpcError(
                    normalized.id,
                    -32003,
                    `move_note blocked: destination "${dest}" is not allowed. Allowed: ${ALLOWED_NOTE_DIRS.join(", ") || "(none)"}.`,
                    { allowed: ALLOWED_NOTE_DIRS },
                  );
                  return new Response(err, { status: 200, headers: { "content-type": "application/json" } });
                }
              }
            }

            if (method === "initialize") {
              headers.delete("mcp-session-id");
            } else {
              try {
                const sid = await ensureUpstreamSessionId(clientId);
                headers.set("mcp-session-id", sid);
              } catch (e) {
                console.error(`[mcp-shim] failed to ensure upstream session id: ${String(e)}`);
              }
            }
          }
          const body = normalized === null ? "" : JSON.stringify(normalized);
          const upstreamResp = await fetchWithTimeout(upstreamUrl, { method: "POST", headers, body });

          const upstreamSid = upstreamResp.headers.get("mcp-session-id");
          if (upstreamSid) clientToUpstreamSession.set(clientId, upstreamSid);

          const respHeaders = new Headers(upstreamResp.headers);
          if (setCookie) respHeaders.append("set-cookie", setCookie);

          if (upstreamResp.status >= 400) {
            const errText = await upstreamResp.text();
            console.log(`[mcp-shim] upstream error status=${upstreamResp.status} body=${errText.slice(0, 300)}`);
            return new Response(errText, {
              status: upstreamResp.status,
              statusText: upstreamResp.statusText,
              headers: respHeaders,
            });
          }

          return new Response(upstreamResp.body, {
            status: upstreamResp.status,
            statusText: upstreamResp.statusText,
            headers: respHeaders,
          });
        } catch (e) {
          if (!(e instanceof SyntaxError)) {
            const err = jsonRpcError(null, -32005, `Upstream request failed: ${String(e)}`, { timeoutMs: UPSTREAM_TIMEOUT_MS });
            return new Response(err, { status: 200, headers: { "content-type": "application/json" } });
          }
          const upstreamResp = await fetchWithTimeout(upstreamUrl, { method: "POST", headers, body: raw });
          const respHeaders = new Headers(upstreamResp.headers);
          if (setCookie) respHeaders.append("set-cookie", setCookie);
          if (upstreamResp.status >= 400) {
            const errText = await upstreamResp.text();
            console.log(`[mcp-shim] upstream error status=${upstreamResp.status} body=${errText.slice(0, 300)}`);
            return new Response(errText, {
              status: upstreamResp.status,
              statusText: upstreamResp.statusText,
              headers: respHeaders,
            });
          }
          return new Response(upstreamResp.body, {
            status: upstreamResp.status,
            statusText: upstreamResp.statusText,
            headers: respHeaders,
          });
        } finally {
          if (releaseToolCall) releaseToolCall();
        }
      }

      const upstreamResp = await fetchWithTimeout(upstreamUrl, {
        method: req.method,
        headers,
        body: req.body,
      });
      if (!setCookie) return upstreamResp;
      const respHeaders = new Headers(upstreamResp.headers);
      respHeaders.append("set-cookie", setCookie);
      return new Response(upstreamResp.body, {
        status: upstreamResp.status,
        statusText: upstreamResp.statusText,
        headers: respHeaders,
      });
    });
{{- end }}
{{- if .Values.obsidianSync.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "basic-memory.fullname" . }}-couchdb-config
  labels:
    {{- include "basic-memory.labels" . | nindent 4 }}
data:
  livesync.ini: |
    [chttpd]
    max_document_size = 50000000
    enable_cors = true
    bind_address = 0.0.0.0

    [cors]
    origins = *
    methods = GET, PUT, POST, HEAD, DELETE
    headers = accept, authorization, content-type, origin, referer, x-csrf-token
    credentials = true

    [chttpd_auth]
    timeout = 3600
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "basic-memory.fullname" . }}-livesync-config
  labels:
    {{- include "basic-memory.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "peers": [
        {
          "type": "couchdb",
          "name": "obsidian-vault",
          "url": "http://127.0.0.1:{{ .Values.obsidianSync.couchdb.service.port }}",
          "database": {{ .Values.obsidianSync.livesync.database | quote }},
          "username": "admin",
          "password": "__COUCHDB_PASSWORD__",
          "passphrase": {{ .Values.obsidianSync.livesync.passphrase | quote }},
          "obfuscatePassphrase": {{ .Values.obsidianSync.livesync.passphrase | quote }},
          "customChunkSize": 100,
          "minimumChunkSize": 20,
          "baseDir": "",
          "useRemoteTweaks": true
        },
        {
          "type": "storage",
          "name": "basic-memory-files",
          "baseDir": "data/",
          "scanOfflineChanges": {{ .Values.obsidianSync.livesync.scanOfflineChanges | default false }},
          "useChokidar": true,
          "ignorePaths": {{ .Values.obsidianSync.livesync.ignorePaths | default list | toJson }}
        }
      ]
    }
{{- end }}
