{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "basic-memory.fullname" . }}-data
  labels:
    {{- include "basic-memory.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
{{- if .Values.basicMemoryHome.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "basic-memory.fullname" . }}-home
  labels:
    {{- include "basic-memory.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.basicMemoryHome.accessMode }}
  {{- with .Values.basicMemoryHome.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.basicMemoryHome.size }}
{{- end }}
{{- if .Values.obsidianSync.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "basic-memory.fullname" . }}-couchdb
  labels:
    {{- include "basic-memory.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.obsidianSync.couchdb.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.obsidianSync.couchdb.persistence.size }}
{{- end }}
