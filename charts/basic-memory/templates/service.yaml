apiVersion: v1
kind: Service
metadata:
  name: {{ include "basic-memory.fullname" . }}
  labels:
    {{- include "basic-memory.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ include "basic-memory.effectiveTargetPort" . }}
      protocol: TCP
      name: http
  selector:
    {{- include "basic-memory.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
