# Basic Memory Helm chart — default values
#
# Basic Memory is a local-first knowledge graph MCP server for LLMs.
# Upstream: https://github.com/basicmachines-co/basic-memory
#
# This chart ships three components:
#   1. Core            — Basic Memory server (always enabled)
#   2. mcpShim         — Optional JSON-RPC normaliser sidecar, adds policy
#                        enforcement + default-project injection. Use this if
#                        your MCP clients are slightly non-compliant or you
#                        want to restrict which directories the LLM can write
#                        to. Default: disabled.
#   3. obsidianSync    — Optional CouchDB + livesync-bridge sidecars that
#                        bidirectionally sync the Basic Memory notes dir with
#                        an Obsidian vault via the Self-hosted LiveSync
#                        plugin. Default: disabled.

replicaCount: 1
revisionHistoryLimit: 3
nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/basicmachines-co/basic-memory
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "0.22.1@sha256:0da35f465fed7b58b6c2e31e7c0dbcbc728760a1b6a71857cfe3ced847c727a1"

imagePullSecrets: []

# -----------------------------------------------------------------------------
# Deno utility image for chart-owned helper scripts.
# -----------------------------------------------------------------------------
# Used by:
#   - mcpShim sidecar             (when mcpShim.enabled=true)
#   - obsidianSync configInitImage (when obsidianSync.enabled=true)
#
# Keep this separate from livesyncBridge.image: livesync-bridge now runs on
# Node, but the chart-owned shim/config helper scripts are still Deno scripts.
denoTools:
  image:
    repository: dhi.io/deno
    tag: "2.8.3-debian13@sha256:55942eb5160a9165054daa533ac6c2ee0e3be87afe2b9daa81d29d5cc9ea1fc8"
    pullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# livesync-bridge image — Node runtime sync daemon
# -----------------------------------------------------------------------------
# The community-maintained Node runtime image used by the obsidianSync
# livesync daemon when obsidianSync.enabled=true.
#
# Pinned to a full commit SHA for reproducibility. Auto-bumped by Renovate's
# github-tags + currentDigest pattern.
#
# Upstream: https://github.com/yaelmoshi/livesync-bridge
livesyncBridge:
  image:
    repository: ghcr.io/yaelmoshi/livesync-bridge
    # GHCR tag format: sha-<full-40-char-commit-sha> (set by publish-ghcr workflow).
    # Bump to the sha-<sha> tag for the latest main commit.
    tag: "sha-01c6d292c69554f9d53f0df39dd55a3300a4ef14@sha256:07fcbc0b21b3a8a6acd03cb6a77b051c1014fb32c6aac325eba04ac67f0adf8b"
    pullPolicy: IfNotPresent

# Basic Memory upstream (Python) server port inside the pod.
# The Kubernetes Service does NOT target this directly — it targets either
# the MCP shim sidecar (if enabled) or the server container itself.
basicMemory:
  upstreamPort: 8001

# Environment variables passed to the server container. These are the
# opinionated upstream tuning knobs plus two hard-won defaults:
#
#   HF_HUB_OFFLINE=1
#     Without this, fastembed re-validates the ONNX model cache on every
#     pod restart. The unauthenticated HuggingFace download can silently
#     drop files mid-transfer, corrupting the cache and breaking semantic
#     search. The semantic-model-cache-init initContainer warms the cache
#     once, then the runtime container runs offline against the PVC.
#
#   BASIC_MEMORY_SYNC_*
#     Reduces file-watcher thrash during churn-heavy sync bursts. Safe
#     defaults for single-pod deployments; raise on beefier hosts.
env:
  BASIC_MEMORY_CONFIG_DIR: "/home/appuser/.basic-memory/config"
  BASIC_MEMORY_HOME: "/app/data/basic-memory"
  BASIC_MEMORY_SEMANTIC_EMBEDDING_CACHE_DIR: "/app/data/fastembed_cache"
  BASIC_MEMORY_DEFAULT_PROJECT: "main"
  BASIC_MEMORY_LOG_LEVEL: "INFO"
  HF_HUB_OFFLINE: "1"
  BASIC_MEMORY_SYNC_THREAD_POOL_SIZE: "2"
  BASIC_MEMORY_SYNC_MAX_CONCURRENT_FILES: "4"
  BASIC_MEMORY_WATCH_PROJECT_RELOAD_INTERVAL: "900"

# Semantic search model used by the fastembed initContainer.
# BAAI/bge-small-en-v1.5 is the Basic Memory default. Change only if you
# know what you're doing.
semanticSearch:
  modelName: "BAAI/bge-small-en-v1.5"
  cacheDir: "/app/data/fastembed_cache"

# Service configuration.
#
# NOTE: The Basic Memory upstream Python server binds 0.0.0.0 on IPv4 only.
# If Kubernetes picks an IPv6 endpoint for a dual-stack Service, some
# ingress controllers (notably Traefik) will return 502. Default SingleStack
# IPv4 avoids this. Change only if you have a dual-stack cluster and have
# tested IPv6 reachability.
service:
  type: ClusterIP
  port: 8000
  # When mcpShim.enabled=true, targetPort is the shim sidecar port.
  # Otherwise it's basicMemory.upstreamPort.
  targetPort: 8000
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4

ingress:
  enabled: false
  className: ""
  # Ingress annotations. Add your ingress controller middleware references
  # here (e.g. Traefik forward-auth, NGINX auth-url, cert-manager, etc.).
  #
  # If you enable the MCP shim AND use Traefik, you may want a Middleware
  # that injects an `Accept: application/json, text/event-stream` header so
  # Traefik negotiates streaming correctly. See examples/traefik-mcp.yaml.
  annotations: {}
  hosts: []
    # - host: basic-memory.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  tls: []
    # - hosts:
    #     - basic-memory.example.com
    #   secretName: basic-memory-tls

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
    # - group: gateway.networking.k8s.io
    #   kind: Gateway
    #   name: traefik-gateway
    #   namespace: traefik
    #   sectionName: websecure
  hostnames: []
    # - basic-memory.example.com
  rules:
    - matches:
        - path:
            # Accepts Gateway API values: Exact, PathPrefix, RegularExpression.
            # "Prefix" is also accepted and mapped to PathPrefix.
            type: PathPrefix
            value: /
      filters: []

# Persistent storage for Basic Memory notes + fastembed model cache.
# This is where your knowledge graph lives. Back it up.
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /app/data

# Separate PVC for /home/appuser/.basic-memory (runtime config + logs).
# Usually fine to leave enabled; uses very little space.
basicMemoryHome:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 640Mi
  limits:
    memory: 1792Mi

# Single-replica PVC-backed workload: use Recreate to avoid two pods
# fighting over the same RWO volume during rollouts.
strategy:
  type: Recreate

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# The upstream Basic Memory server has no dedicated health endpoint,
# so we use TCP probes on the listening port.
startupProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 30
livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

pdb:
  enabled: false
  maxUnavailable: 1

serviceAccount:
  create: true
  annotations: {}
  name: ""

nodeSelector: {}
tolerations: []
affinity: {}

# -----------------------------------------------------------------------------
# Profile 1 — MCP compatibility shim (optional)
# -----------------------------------------------------------------------------
# A Deno-based sidecar that fronts the Basic Memory /mcp endpoint and:
#   - Normalises slightly non-compliant JSON-RPC from buggy MCP clients
#     (e.g. clients that omit `jsonrpc: "2.0"`).
#   - Injects a default `project` argument for tools that require it.
#   - Enforces a write-directory allowlist (keeps LLMs writing only into
#     directories you designate).
#   - Throttles expensive mutating tools (write_note, edit_note, move_note,
#     delete_note) with a bounded in-flight queue.
#   - Blocks delete_note unless explicitly allowed.
#
# When enabled, the Kubernetes Service targets the shim (not the upstream
# Basic Memory server directly). The shim proxies to 127.0.0.1:{upstreamPort}
# inside the pod.
#
# Uses denoTools.image by default. Override here if you need a different
# image for the shim.
mcpShim:
  enabled: false
  # Optional image override. Leave empty ({}) to inherit from
  # .Values.denoTools.image. Fields are merged on top of the root
  # block, so you can override just `tag` without restating repository etc.
  image: {}
  # Cap concurrent throttled tool calls. Protects the upstream DB pool from
  # request bursts.
  maxToolCallConcurrency: 4
  # Queue timeout for the throttled tool slot. Fail fast on saturation.
  toolCallQueueTimeoutMs: 12000
  # Upstream request timeout. Prevents hanging client requests.
  upstreamTimeoutMs: 45000
  # Tool names that count against the throttled concurrency slot above.
  # Defaults to mutating tools; reads pass through unthrottled.
  throttledTools:
    - write_note
    - edit_note
    - move_note
    - delete_note
  # Policy enforcement. Keeps LLM writes organised.
  policy:
    # Top-level directories (relative to BASIC_MEMORY_HOME) that write_note
    # and move_note are allowed to target. Empty list = block all writes.
    # Example: ["notes", "decisions", "inbox"]
    allowedNoteDirs: []
    # Set true to allow the MCP client to call delete_note. Default is
    # false — you have to ask a human before deleting notes.
    allowDeleteNote: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -----------------------------------------------------------------------------
# Profile 2 — Obsidian LiveSync integration (optional)
# -----------------------------------------------------------------------------
# Deploys a CouchDB + livesync-bridge pair that bidirectionally syncs the
# Basic Memory notes directory with an Obsidian vault using the Self-hosted
# LiveSync plugin (https://github.com/vrtmrz/obsidian-livesync).
#
# Architecture when enabled:
#   Obsidian plugin  <--> CouchDB  <--> livesync-bridge  <--> /app/data/basic-memory
#
# You must create a Kubernetes Secret before installing the chart:
#   kubectl create secret generic basic-memory-couchdb \
#     --from-literal=COUCHDB_USER=admin \
#     --from-literal=COUCHDB_PASSWORD=<strong-password>
#
# Uses the top-level livesyncBridge.image for the Node sync daemon and
# denoTools.image for the Deno config-init container. Override per-component
# under obsidianSync.livesync.{image,configInitImage} if you need to.
obsidianSync:
  enabled: false

  couchdb:
    image:
      repository: dhi.io/couchdb
      tag: "3.5.2-debian13@sha256:8ac484e0ec85d4baa6a08638b43dc91fe756c9ef7a0674106244ace1974b4f35"
      pullPolicy: IfNotPresent
    # Name of a pre-created Secret containing COUCHDB_USER + COUCHDB_PASSWORD.
    existingSecret:
      name: basic-memory-couchdb
      userKey: COUCHDB_USER
      passwordKey: COUCHDB_PASSWORD
    persistence:
      size: 2Gi
      storageClass: ""
    service:
      port: 5984
    # Optional public ingress to the CouchDB endpoint so Obsidian clients
    # (phones, desktops) can sync from anywhere. If you don't need external
    # access, leave disabled and tunnel via port-forward or Tailscale.
    ingress:
      enabled: false
      className: ""
      annotations: {}
      host: ""
      tls: []
    httpRoute:
      enabled: false
      annotations: {}
      parentRefs: []
        # - group: gateway.networking.k8s.io
        #   kind: Gateway
        #   name: traefik-gateway
        #   namespace: traefik
        #   sectionName: websecure
      hostnames: []
    resources:
      requests:
        cpu: 150m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 384Mi

  livesync:
    # Optional image override for the livesync-bridge sidecar. Leave empty
    # ({}) to inherit from .Values.livesyncBridge.image.
    image: {}
    # Optional image override for the config-init container that renders
    # config.json with the CouchDB password templated in. Leave empty ({})
    # to inherit from .Values.denoTools.image.
    configInitImage: {}
    # Obsidian LiveSync database name (must match the plugin config).
    database: obsidian
    # End-to-end encryption passphrase. Leave empty for no encryption; set
    # to the same value as your Obsidian plugin configuration otherwise.
    passphrase: ""
    # Scan for offline changes on startup. Disable to avoid a race condition
    # on large vaults where many files need syncing at once.
    scanOfflineChanges: false
    # Glob patterns for paths to skip during scanning and watching.
    # Matched against each path segment — ".git" ignores ".git/" at any depth.
    ignorePaths:
      - ".git"
      - ".obsidian"
      - ".smart-env"
      - ".trash"
      - ".deno"
      - ".basic-memory-config"
      - ".basic-memory-config/**"
      - "node_modules"
      - "fastembed_cache"
      - "fastembed_cache/**"
      - "basic-memory/fastembed_cache"
      - "basic-memory/fastembed_cache/**"
      - "*.tmp"
    resources:
      requests:
        cpu: 100m
        memory: 96Mi
      limits:
        cpu: 250m
        memory: 384Mi
