apiVersion: v2
name: cnpg-stack
description: CloudNativePG stack wrapper (operator, cluster, barman plugin, pooler, metrics)
type: application
version: 0.13.52
appVersion: "1.30.0"
kubeVersion: ">=1.29.0-0"
maintainers:
  - name: m0sh1
    email: yael@m0sh1.cc
keywords:
  - postgresql
  - cloudnative-pg
  - pgbouncer
  - barman
  - backup
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: Run PostgreSQL 18.4 on the CNPG-compatible DHI Alpine 3.24 image.
    - kind: fixed
      description: Sanitize Database resource names while preserving PostgreSQL database names.
    - kind: changed
      description: Align the wrapper app version with the vendored CloudNativePG operator.
dependencies:
  - name: cloudnative-pg-chart
    alias: cloudnative-pg
    version: 0.29.0
    repository: oci://dhi.io
  - name: plugin-barman-cloud
    version: 0.7.0
    repository: https://cloudnative-pg.github.io/charts
