customLabels: {}
image:
  baseRepo: registry.k8s.io
  nfs:
    repository: ghcr.io/isityael/nfsplugin
    tag: v4.14.0-sm3@sha256:1428c599d1557c7d80e9b9198b61ce5d215b7facf22f3054d85b0199e9ce9cd5
    pullPolicy: IfNotPresent
  csiProvisioner:
    repository: dhi.io/csi-provisioner
    tag: 6.3.0-debian13@sha256:f6669f006c75eedf62182971036b42565fffbade2f6ff9f7a07be098820b115a
    pullPolicy: IfNotPresent
  csiResizer:
    repository: dhi.io/csi-resizer
    tag: 2.2.0-debian13@sha256:dc9dcde260e125ee80841ef3508ff94c14f3b875856407249b733e7c0b11a136
    pullPolicy: IfNotPresent
  csiSnapshotter:
    repository: dhi.io/csi-snapshotter
    tag: 8.6.0-debian13@sha256:64cdae6723b504ce2f1709b3ce5e1e894937481e763b720150446c9ac6341054
    pullPolicy: IfNotPresent
  livenessProbe:
    repository: dhi.io/livenessprobe
    tag: 2.19.0-debian13@sha256:ae521951120f5bb402ba7732707ce69c8e64f0c350cadfebe82a3d0463f5034f
    pullPolicy: IfNotPresent
  nodeDriverRegistrar:
    repository: dhi.io/csi-node-driver-registrar
    tag: 2.17.0-debian13@sha256:edd77412e20f8cd73eae699a41a874b086a88cc1886c7f677917044484420488
    pullPolicy: IfNotPresent
  externalSnapshotter:
    repository: dhi.io/snapshot-controller
    tag: 8.6.0-debian13@sha256:ade207c107967b9042f0a8f4e3079ee8af77a3bf9d03216b58ef3b60a5d3c0ec
    pullPolicy: IfNotPresent

serviceAccount:
  create: true
  controller: csi-nfs-controller-sa
  node: csi-nfs-node-sa

rbac:
  create: true
  name: nfs

driver:
  name: nfs.csi.k8s.io
  mountPermissions: 0

feature:
  enableFSGroupPolicy: true
  # fsGroupPolicy controls how the kubelet applies fsGroup to volumes from this
  # CSI driver. Allowed values: File (default, always apply), None (skip entirely),
  # ReadWriteOnceWithFSType (only RWO with fsType set).
  # Set to "None" for NFS to avoid slow recursive chown on every pod mount.
  fsGroupPolicy: File
  enableInlineVolume: false
  propagateHostMountOptions: false

kubeletDir: /var/lib/kubelet

controller:
  name: csi-nfs-controller
  replicas: 1
  strategyType: Recreate
  runOnMaster: false
  runOnControlPlane: false
  enableSnapshotter: true
  podSecurityContext: {}
  provisioner:
    featureGates:
      VolumeAttributesClass: "false"
  resizer:
    featureGates:
      VolumeAttributesClass: "false"
  useTarCommandInSnapshot: false
  enableSnapshotCompression: true
  livenessProbe:
    healthPort: 29652
  logLevel: 5
  workingMountDir: /tmp
  dnsPolicy: ClusterFirstWithHostNet
  defaultOnDeletePolicy: delete
  affinity: {}
  nodeSelector: {}
  priorityClassName: system-cluster-critical
  tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/controlplane"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "CriticalAddonsOnly"
      operator: "Exists"
      effect: "NoSchedule"
  resources:
    csiProvisioner:
      limits:
        memory: 400Mi
      requests:
        cpu: 10m
        memory: 20Mi
    csiResizer:
      limits:
        memory: 400Mi
      requests:
        cpu: 10m
        memory: 20Mi
    csiSnapshotter:
      limits:
        memory: 200Mi
      requests:
        cpu: 10m
        memory: 20Mi
    livenessProbe:
      limits:
        memory: 100Mi
      requests:
        cpu: 10m
        memory: 20Mi
    nfs:
      limits:
        memory: 200Mi
      requests:
        cpu: 10m
        memory: 20Mi

nodeDriverRegistrar:
  timeout: 60
  healthPort: 19809
  livenessProbe:
    enabled: true
    initialDelaySeconds: 20
    timeoutSeconds: 10
    periodSeconds: 20
    failureThreshold: 2

node:
  name: csi-nfs-node
  podSecurityContext: {}
  dnsPolicy: ClusterFirstWithHostNet
  maxUnavailable: 1
  logLevel: 5
  livenessProbe:
    healthPort: 29653
  affinity: {}
  nodeSelector: {}
  priorityClassName: system-cluster-critical
  tolerations:
    - operator: "Exists"
  resources:
    livenessProbe:
      limits:
        memory: 100Mi
      requests:
        cpu: 10m
        memory: 20Mi
    nodeDriverRegistrar:
      limits:
        memory: 100Mi
      requests:
        cpu: 10m
        memory: 20Mi
    nfs:
      limits:
        memory: 300Mi
      requests:
        cpu: 10m
        memory: 20Mi

externalSnapshotter:
  enabled: false
  name: snapshot-controller
  priorityClassName: system-cluster-critical
  deletionPolicy: Delete
  controller:
    replicas: 1
  resources:
    limits:
      memory: 300Mi
    requests:
      cpu: 10m
      memory: 20Mi
  customResourceDefinitions:
    # If true, VolumeSnapshot CRDs will be created. Set false if they already exist.
    enabled: true

volumeSnapshotClass:
  create: false
  name: csi-nfs-snapclass
  deletionPolicy: Delete

imagePullSecrets: []

storageClass:
  create: false
