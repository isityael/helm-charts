apiVersion: v2
name: csi-s3
description: Maintained k8s-csi-s3 wrapper with an owned driver image and multiple StorageClasses
type: application
version: 0.1.5
appVersion: "0.43.7-ym4"
kubeVersion: ">=1.23.0-0"
home: https://github.com/isityael/k8s-csi-s3
icon: https://raw.githubusercontent.com/yandex-cloud/geesefs/master/doc/geesefs.png
maintainers:
  - name: Yael
    email: yael@m0sh1.cc
sources:
  - https://github.com/yandex-cloud/k8s-csi-s3
  - https://github.com/isityael/k8s-csi-s3
keywords:
  - s3
  - csi
  - storage
  - kubernetes
annotations:
  artifacthub.io/changes: |
