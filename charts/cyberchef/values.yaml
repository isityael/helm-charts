# Default values for cyberchef.

replicaCount: 1

image:
  repository: ghcr.io/gchq/cyberchef
  tag: 11.0.0@sha256:45082a0ac41d6beeea2daeb192d8b20c66520362854542f4fe340aab37635f66
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

containerPort: 8000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: cyberchef.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  # HTTPRoute path matches reuse ingress.hosts[*].paths.
  parentRefs: []
    # - group: gateway.networking.k8s.io
    #   kind: Gateway
    #   name: traefik-gateway
    #   namespace: traefik
    #   sectionName: websecure
  hostnames: []

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL

env: []

livenessProbe:
  httpGet:
    path: /
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

imagePullSecrets: []
