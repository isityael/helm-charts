{{- if .Values.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "umami.bootstrapName" . }}
  labels:
    {{- include "umami.bootstrapLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: umami-bootstrap
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "umami.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.bootstrap.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bootstrap
          image: "{{ .Values.bootstrap.image.repository }}:{{ .Values.bootstrap.image.tag }}"
          imagePullPolicy: {{ .Values.bootstrap.image.pullPolicy }}
          command:
            - python3
            - /scripts/bootstrap.py
          env:
            - name: UMAMI_URL
              value: "http://{{ include "umami.fullname" . }}:{{ .Values.service.port }}"
            - name: DEFAULT_ADMIN_USERNAME
              value: {{ .Values.bootstrap.defaultAdmin.username | quote }}
            - name: DEFAULT_ADMIN_PASSWORD
              value: {{ .Values.bootstrap.defaultAdmin.password | quote }}
            - name: ADMIN_USERNAME
              value: {{ .Values.bootstrap.admin.username | quote }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrap.admin.passwordSecret.name }}
                  key: {{ .Values.bootstrap.admin.passwordSecret.key }}
            - name: WEBSITE_ID
              value: {{ .Values.bootstrap.website.id | quote }}
            - name: WEBSITE_NAME
              value: {{ .Values.bootstrap.website.name | quote }}
            - name: WEBSITE_DOMAIN
              value: {{ .Values.bootstrap.website.domain | quote }}
          resources:
            {{- toYaml .Values.bootstrap.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: bootstrap-script
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: bootstrap-script
          configMap:
            name: {{ include "umami.bootstrapName" . }}-script
            defaultMode: 0555
        - name: tmp
          emptyDir: {}
{{- end }}
