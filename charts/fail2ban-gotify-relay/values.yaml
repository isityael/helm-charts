# Default values for fail2ban-gotify-relay.

image:
  repository: ghcr.io/sm-moshi/fail2ban-gotify-relay
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: "@sha256:84047f9e927dcc170e216db60d69090c502925b4360a5956eab5a16fd05a7175"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Gotify server URL (e.g. http://gotify.apps.svc.cluster.local)
gotifyURL: ""

# -- Existing secret containing GOTIFY_TOKEN key
existingSecret: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: f2b-relay.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  # HTTPRoute path matches reuse ingress.hosts[*].paths.
  parentRefs: []
    # - group: gateway.networking.k8s.io
    #   kind: Gateway
    #   name: traefik-gateway
    #   namespace: traefik
    #   sectionName: websecure
  hostnames: []

resources:
  requests:
    cpu: 5m
    memory: 16Mi
  limits:
    memory: 32Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

nodeSelector:
  kubernetes.io/os: linux

tolerations: []
affinity: {}
