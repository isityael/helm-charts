# fail2ban-gotify-relay is rendered by bjw-s-labs/app-template.
# See https://bjw-s-labs.github.io/helm-charts/docs/app-template/
app-template:
  defaultPodOptions:
    automountServiceAccountToken: false
    enableServiceLinks: false
    nodeSelector:
      kubernetes.io/os: linux
    securityContext:
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault

  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: Recreate
      revisionHistoryLimit: 3
      containers:
        main:
          nameOverride: fail2ban-gotify-relay
          image:
            repository: ghcr.io/isityael/fail2ban-gotify-relay
            tag: "4cb886bb@sha256:223bcc375680950c72cd3da907cf30c3e82d376ab95520a6935a7aaf0cae18e7"
            pullPolicy: IfNotPresent
          env:
            GOTIFY_URL: ""
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /healthz
              spec:
                initialDelaySeconds: 5
                periodSeconds: 30
            readiness:
              enabled: true
              type: HTTP
              path: /healthz
              spec:
                initialDelaySeconds: 3
                periodSeconds: 10
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534

  service:
    main:
      controller: main
      ports:
        http:
          port: 8080
          targetPort: http
          protocol: TCP

  ingress:
    main:
      enabled: false
      className: ""
      hosts:
        - host: f2b-relay.example.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http

  route:
    main:
      enabled: false
      kind: HTTPRoute
      parentRefs: []
      hostnames: []
      rules: []
