  artifacthub.io/images: |
    - name: forgejo-runner
      image: ghcr.io/yaelmoshi/forgejo-runner:12.10.1-3514b8b4@sha256:6bf1d3670bce8dd01bda43182834a1bff73fcbe316ccf204265795ab9837900a
