replicaCount: 1
revisionHistoryLimit: 2

nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

imagePullSecrets: []

# -- Docker-in-Docker sidecar container
dind:
  enabled: true
  image:
    repository: docker
    tag: "29.6.1-dind-alpine3.24@sha256:66d292e5c26bd33a6f6f61cacb880de2186339a524ecba1ce098dbbaceed6515"
    pullPolicy: IfNotPresent
  args:
    - --tls=false
    - --group=1000
  securityContext:
    privileged: true
    runAsUser: 0
    runAsGroup: 0
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 4Gi

# -- Forgejo Actions runner container
runner:
  image:
    repository: ghcr.io/isityael/forgejo-runner
    tag: "12.12.0-a1a383f9@sha256:7edf0bf1125982fea00a357e4226f919ed1fd10df34d39b4494400c142363c85"
    pullPolicy: IfNotPresent
  # -- Forgejo instance URL used for first registration when /data/.runner is absent.
  instanceURL: ""
  # -- Existing Secret containing the registration token. Plaintext token values are intentionally unsupported.
  registrationTokenSecret: ""
  registrationTokenKey: REGISTRATION_TOKEN
  name: ""
  # -- Default labels passed during first registration. Use Forgejo's <label>:<type>://<image> format.
  baseLabels: "docker:docker://ghcr.io/isityael/forgejo-job-alpine:3.23"
  jobLabel: ""
  jobImage: ""
  labels: ""
  dataMountPath: /data
  existingRunnerSecret: ""
  existingConfigSecret: ""
  extraEnv: []
  config:
    log:
      level: info
      job_level: info
    runner:
      file: /data/.runner
      capacity: 1
      timeout: 3h
      insecure: false
      fetch_timeout: 5s
      fetch_interval: 2s
      envs: {}
      env_file: .env
    cache:
      enabled: true
      dir: /data/.cache/actcache
      host: ""
      port: 0
      external_server: ""
    container:
      network: ""
      enable_ipv6: false
      privileged: false
      options: ""
      workdir_parent: ""
      valid_volumes: []
      docker_host: "-"
      force_pull: false
    host:
      workdir_parent: ""
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    privileged: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 1Gi

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

daemonConfig:
  registryMirrors: []
  insecureRegistries: []
  features:
    buildkit: true

registryAuthSecret: ""
registryAuthSecretKey: .dockerconfigjson
registryAuthMountPath: /root/.docker/config.json

registryCASecret: ""
registryCAKey: ca.crt
registryCAMounts: []

persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  existingClaim: ""

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
