apiVersion: v2
name: forgejo
description: Improved Forgejo chart wrapper with custom image defaults and optional Forgejo Runner
type: application
version: 0.1.18
appVersion: "15.0.3"
kubeVersion: ">=1.28.0-0"
home: https://forgejo.org/
icon: https://code.forgejo.org/forgejo/forgejo/raw/branch/forgejo/assets/logo.svg
maintainers:
  - name: m0sh1
    email: yael@m0sh1.cc
sources:
  - https://code.forgejo.org/forgejo-helm/forgejo-helm
  - https://codeberg.org/forgejo/forgejo
  - https://github.com/isityael/helm-charts
keywords:
  - git
  - forgejo
  - gitea
  - code-review
  - actions
  - runner
annotations:
  category: Source Control
  licenses: GPL-3.0-or-later
  artifacthub.io/license: GPL-3.0-or-later
  artifacthub.io/links: |
    - name: Forgejo
      url: https://forgejo.org/
    - name: Upstream Helm chart
      url: https://code.forgejo.org/forgejo-helm/forgejo-helm
    - name: Custom image source
      url: https://git.m0sh1.cc/m0sh1/infra-cli
  artifacthub.io/images: |
    - name: forgejo
      image: ghcr.io/isityael/forgejo:2b3887b6@sha256:f6060e8de865ee543c97689994755d43278c2750e087ed192c28b0aac5be5f07
    - name: forgejo-runner
      image: ghcr.io/isityael/forgejo-runner:12.12.0-a1a383f9@sha256:7edf0bf1125982fea00a357e4226f919ed1fd10df34d39b4494400c142363c85
    - name: forgejo-job-alpine
      image: ghcr.io/isityael/forgejo-job-alpine:3.23
  artifacthub.io/changes: |
    - kind: added
      description: Add improved Forgejo wrapper chart based on upstream Forgejo Helm chart 17.1.0.
    - kind: added
      description: >-
        Default to the custom ghcr.io/isityael/forgejo rootless-compatible image without upstream's automatic
        -rootless suffix.
    - kind: added
      description: Include optional forgejo-runner subchart dependency for co-deploying Actions runners.
    - kind: changed
      description: Depend on forgejo-runner chart 0.1.3 with the m0sh1.cc custom runner image default.
    - kind: changed
      description: Depend on forgejo-runner chart 0.1.4 with the m0sh1.cc Forgejo Runner 12.10.1 custom image.
    - kind: changed
      description: Depend on forgejo-runner chart 0.1.9 with the m0sh1.cc Forgejo Runner 12.12.0 custom image.
    - kind: changed
      description: Vendor forgejo-runner chart 0.1.10 to match Chart.lock.
    - kind: changed
      description: Default the optional runner labels to the m0sh1.cc DHI-based Forgejo job Alpine image.
    - kind: fixed
      description: Depend on forgejo-runner 0.1.11 to fix duplicate Docker daemon listener bindings.
    - kind: fixed
      description: Depend on forgejo-runner 0.1.12 so runner PVC rollouts use a Recreate strategy.
    - kind: fixed
      description: Depend on forgejo-runner 0.1.13 to clear stale rollingUpdate state during migration.
dependencies:
  - name: forgejo
    version: 17.1.2
    repository: oci://code.forgejo.org/forgejo-helm
  - name: forgejo-runner
    alias: runner
    version: 0.1.13
    repository: oci://ghcr.io/isityael/charts
    condition: runner.enabled
