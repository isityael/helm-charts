# Default values for gitea-runner.

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

# -- Docker-in-Docker sidecar container
dind:
  image:
    repository: docker
    tag: "29.4.0-dind-alpine3.23@sha256:f80c26212befc1c1988b529495532c6b9180d9b1dab1611f4a1efbe9da8ec821"
    pullPolicy: IfNotPresent
  args:
    - --host=unix:///var/run/docker.sock
    - --tls=false
  securityContext:
    privileged: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 4Gi

# -- Gitea Actions runner container
runner:
  image:
    repository: gitea/act_runner
    tag: "0.3.1@sha256:c2a169c5e99864c25e32527cef3d82203225e09558773022bf3dc164a2e6d762"
    pullPolicy: IfNotPresent
  instanceURL: ""
  registrationTokenSecret: ""
  registrationTokenKey: REGISTRATION_TOKEN
  name: ""
  baseLabels: self-hosted
  jobLabel: ""
  jobImage: ""
  extraEnv: []
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    runAsNonRoot: false
    allowPrivilegeEscalation: true
    privileged: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 1Gi

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

daemonConfig:
  registryMirrors: []
  insecureRegistries: []
  features:
    buildkit: true

registryAuthSecret: ""
registryAuthSecretKey: .dockerconfigjson
registryAuthMountPath: /root/.docker/config.json

registryCASecret: ""
registryCAKey: ca.crt
registryCAMounts: []

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
