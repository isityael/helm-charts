# Default values for gitea-runner.

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

# -- Docker-in-Docker sidecar container
dind:
  image:
    repository: docker
    tag: "29.5.2-dind-alpine3.23@sha256:6b9cd914eb9c6b342c040a49a27a5eb3804453bae6ecc90f7ff96133595a95e8"
    pullPolicy: IfNotPresent
  args:
    - --host=unix:///var/run/docker.sock
    - --tls=false
  securityContext:
    privileged: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 4Gi

# -- Gitea Actions runner container
runner:
  image:
    repository: gitea/runner
    tag: "1.0.7@sha256:ffb252a8488313acb085f553724c01808158ca1b860f517d46ad6642f601de07"
    pullPolicy: IfNotPresent
  instanceURL: ""
  registrationTokenSecret: ""
  registrationTokenKey: REGISTRATION_TOKEN
  name: ""
  baseLabels: self-hosted
  jobLabel: ""
  jobImage: ""
  labels: ""
  dataMountPath: /data
  extraEnv: []
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    runAsNonRoot: false
    allowPrivilegeEscalation: true
    privileged: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 1Gi

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

daemonConfig:
  registryMirrors: []
  insecureRegistries: []
  features:
    buildkit: true

registryAuthSecret: ""
registryAuthSecretKey: .dockerconfigjson
registryAuthMountPath: /root/.docker/config.json

registryCASecret: ""
registryCAKey: ca.crt
registryCAMounts: []

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
