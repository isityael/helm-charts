replicaCount: 1
revisionHistoryLimit: 2

image:
  repository: ghcr.io/sm-moshi/healthchecks
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 8000
  containerPort: 8000

env:
  SITE_NAME: Healthchecks
  SITE_ROOT: https://checks.example.com
  ALLOWED_HOSTS: checks.example.com
  DB: postgres
  DB_SSLMODE: disable
  DEBUG: "False"
  REGISTRATION_OPEN: "False"
  SHELL_ENABLED: "False"

database:
  existingSecret:
    name: ""
    keys:
      host: host
      port: port
      name: database
      user: username
      password: password
  values:
    host: ""
    port: "5432"
    name: healthchecks
    user: healthchecks

secretEnv:
  SECRET_KEY:
    secretName: ""
    key: secret-key
  EMAIL_HOST_PASSWORD:
    secretName: ""
    key: smtp-password

extraEnv: []
extraEnvFrom: []

migrate:
  enabled: true
  command:
    - /opt/healthchecks/manage.py
    - migrate
    - --noinput

sendalerts:
  enabled: true
  replicaCount: 1
  command:
    - /opt/healthchecks/manage.py
    - sendalerts
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: checks.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  privatePaths:
    - /
  publicPaths:
    - /ping/
    - /badge/
  privateFilters: []
  publicFilters: []

probes:
  liveness:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 768Mi

nodeSelector: {}
tolerations: []
affinity: {}
