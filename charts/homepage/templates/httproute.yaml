{{- if and .Values.ingress.enabled .Values.httpRoute.enabled -}}
{{- fail "homepage chart: only one of ingress.enabled or httpRoute.enabled can be true" -}}
{{- end -}}
{{- if .Values.httpRoute.enabled -}}
{{- if eq (len .Values.httpRoute.parentRefs) 0 -}}
{{- fail "homepage chart: httpRoute.parentRefs must contain at least one Gateway parentRef when httpRoute.enabled=true" -}}
{{- end -}}
{{- if eq (len .Values.ingress.hosts) 0 -}}
{{- fail "homepage chart: httpRoute uses ingress.hosts[*].paths for matches, so ingress.hosts must contain at least one entry when httpRoute.enabled=true" -}}
{{- end -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "homepage.fullname" . }}
  labels:
    {{- include "homepage.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- if .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml .Values.httpRoute.hostnames | nindent 4 }}
  {{- else }}
  hostnames:
    {{- range .Values.ingress.hosts }}
    - {{ .host | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    {{- range .paths }}
    {{- $gatewayPathType := .pathType | default "PathPrefix" }}
    {{- if or (eq $gatewayPathType "Prefix") (eq $gatewayPathType "ImplementationSpecific") }}
    {{- $gatewayPathType = "PathPrefix" }}
    {{- end }}
    - matches:
        - path:
            type: {{ $gatewayPathType }}
            value: {{ .path | quote }}
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "homepage.fullname" $ }}
          port: {{ $.Values.service.port }}
          weight: 1
    {{- end }}
    {{- end }}
{{- end }}
