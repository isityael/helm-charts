# Default values for homepage dashboard.

replicaCount: 1

image:
  repository: ghcr.io/gethomepage/homepage
  tag: v1.12.1@sha256:9627769818fbfb14147d3e633e57cef9c27c0c5f07585f5a1d6c3d3425b3b33c
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

containerPort: 3000

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: homepage.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

rbac:
  enabled: false
  extraRules: []

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL

env:
  - name: HOMEPAGE_ALLOWED_HOSTS
    # This value must be set
    value: null

livenessProbe:
  httpGet:
    path: /api/healthcheck
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/healthcheck
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    memory: 512Mi

config:
  # To use an existing ConfigMap, set this to its name
  useExistingConfigMap: ""

  bookmarks:
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/

  services:
    - My First Group:
        - My First Service:
            href: http://localhost/
            description: Homepage is awesome

  widgets:
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: duckduckgo
        target: _blank

  kubernetes:
    mode: disable
    # gateway: true

  docker: {}
  settings: {}

  # Optional: use string variants to preserve ordering
  # bookmarksString: |
  #   - Developer:
  #       - Github:
  #           - abbr: GH
  #             href: https://github.com/
  # servicesString: ""
  # widgetsString: ""
  # kubernetesString: ""
  # dockerString: ""
  # settingsString: ""

  # Optional Proxmox config (proxmox.yaml)
  proxmox: {}
  # proxmoxString: ""

  # Optional custom styling/scripts
  customCss: ""
  customJs: ""

  # Additional config files (filename -> YAML map or raw string)
  extraFiles: {}

nodeSelector: {}
tolerations: []
affinity: {}

imagePullSecrets: []
