controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/corentinth/it-tools
          tag: 2024.10.22-7ca5933@sha256:8b8128748339583ca951af03dfe02a9a4d7363f61a216226fc28030731a5a61f
          pullPolicy: IfNotPresent
        ports:
          - name: http
            containerPort: 80
            protocol: TCP
        env: []
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /
            port: 80
          readiness:
            enabled: true
            type: HTTP
            path: /
            port: 80
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          capabilities:
            drop:
              - ALL

defaultPodOptions:
  securityContext:
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

service:
  main:
    controller: main
    ports:
      http:
        port: 80
        primary: true

ingress:
  main:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: it-tools.local
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls: []

serviceAccount:
  it-tools:
    enabled: false
    annotations: {}
    labels: {}
    # forceRename: ""

podAnnotations: {}
podLabels: {}
