{{- if .Values.browser.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karakeep.fullname" . }}-browser
  labels:
    {{- include "karakeep.labels" . | nindent 4 }}
    app.kubernetes.io/component: browser
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "karakeep.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: browser
  template:
    metadata:
      labels:
        {{- include "karakeep.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: browser
    spec:
      securityContext:
        {{- toYaml .Values.browser.podSecurityContext | nindent 8 }}
      containers:
        - name: browser
          image: "{{ .Values.browser.image.repository }}:{{ .Values.browser.image.tag }}"
          imagePullPolicy: {{ .Values.browser.image.pullPolicy }}
          args:
            {{- toYaml .Values.browser.args | nindent 12 }}
          securityContext:
            {{- toYaml .Values.browser.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 9222
          resources:
            {{- toYaml .Values.browser.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "karakeep.fullname" . }}-browser
  labels:
    {{- include "karakeep.labels" . | nindent 4 }}
    app.kubernetes.io/component: browser
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9222
      targetPort: http
  selector:
    {{- include "karakeep.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: browser
{{- end }}
