{{- if .Values.meilisearch.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karakeep.fullname" . }}-meilisearch
  labels:
    {{- include "karakeep.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "karakeep.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: meilisearch
  template:
    metadata:
      labels:
        {{- include "karakeep.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: meilisearch
    spec:
      securityContext:
        {{- toYaml .Values.meilisearch.podSecurityContext | nindent 8 }}
      containers:
        - name: meilisearch
          image: "{{ .Values.meilisearch.image.repository }}:{{ .Values.meilisearch.image.tag }}"
          imagePullPolicy: {{ .Values.meilisearch.image.pullPolicy }}
          {{- with .Values.meilisearch.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.meilisearch.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.meilisearch.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 7700
          env:
            - name: MEILI_ENV
              value: production
            - name: MEILI_NO_ANALYTICS
              value: "true"
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-config" (include "karakeep.fullname" .)) .Values.secretEnv.MEILI_MASTER_KEY.secretName }}
                  key: {{ .Values.secretEnv.MEILI_MASTER_KEY.key }}
            {{- with .Values.meilisearch.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- if .Values.meilisearch.persistence.enabled }}
            - name: data
              mountPath: /meili_data
            {{- end }}
          resources:
            {{- toYaml .Values.meilisearch.resources | nindent 12 }}
      volumes:
        {{- if .Values.meilisearch.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-meilisearch" (include "karakeep.fullname" .)) .Values.meilisearch.persistence.existingClaim }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "karakeep.fullname" . }}-meilisearch
  labels:
    {{- include "karakeep.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 7700
      targetPort: http
  selector:
    {{- include "karakeep.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
{{- if and .Values.meilisearch.persistence.enabled (not .Values.meilisearch.persistence.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "karakeep.fullname" . }}-meilisearch
  labels:
    {{- include "karakeep.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  accessModes:
    - {{ .Values.meilisearch.persistence.accessMode }}
  {{- if .Values.meilisearch.persistence.storageClass }}
  storageClassName: {{ .Values.meilisearch.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.meilisearch.persistence.size }}
{{- end }}
{{- end }}
