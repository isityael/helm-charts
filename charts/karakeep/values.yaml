replicaCount: 1
revisionHistoryLimit: 2

image:
  repository: ghcr.io/sm-moshi/karakeep
  tag: "30fa6ab6@sha256:8606aa8ed4a9bf395e336ab757981667d6595678472304542d7afd572eeaa8b3"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
hostAliases: []

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 3000
  containerPort: 3000

env:
  NODE_ENV: production
  PORT: "3000"
  HOSTNAME: 0.0.0.0
  DATA_DIR: /data
  ASSETS_DIR: /data/assets
  DISABLE_SIGNUPS: "true"

secretEnv:
  NEXTAUTH_SECRET:
    secretName: ""
    key: nextauth-secret
  MEILI_MASTER_KEY:
    secretName: ""
    key: meili-master-key

extraEnv: []
extraEnvFrom: []

database:
  existingSecret:
    name: ""
    keys:
      host: host
      port: port
      name: database
      user: username
      password: password
  values:
    host: ""
    port: "5432"
    name: karakeep
    user: karakeep
    password: ""

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  existingClaim: ""
  mountPath: /data

meilisearch:
  enabled: true
  url: ""
  image:
    repository: getmeili/meilisearch
    tag: "v1.43.1@sha256:4407d9f9a4a5b8ef2e382827782b3dd6e0ecf8f2832ecb0344601691c13da149"
    pullPolicy: IfNotPresent
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
    readOnlyRootFilesystem: false
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
    accessMode: ReadWriteOnce
    existingClaim: ""
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

browser:
  enabled: true
  url: ""
  image:
    repository: gcr.io/zenika-hub/alpine-chrome
    tag: "125"
    pullPolicy: IfNotPresent
  args:
    - --no-sandbox
    - --disable-gpu
    - --disable-dev-shm-usage
    - --remote-debugging-address=0.0.0.0
    - --remote-debugging-port=9222
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
    readOnlyRootFilesystem: false
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: keep.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  filters: []

probes:
  liveness:
    enabled: true
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    enabled: true
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1500m
    memory: 1536Mi

nodeSelector: {}
tolerations: []
affinity: {}
