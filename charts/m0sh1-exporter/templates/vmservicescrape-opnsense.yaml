{{- if .Values.opnsenseExporter.vmServiceScrape.enabled }}
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: {{ include "m0sh1-exporter.opnsenseName" . }}
  namespace: {{ .Values.opnsenseExporter.vmServiceScrape.namespace | default .Release.Namespace }}
  labels:
    {{- include "m0sh1-exporter.labels" . | nindent 4 }}
    {{- with .Values.opnsenseExporter.vmServiceScrape.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "m0sh1-exporter.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.opnsenseExporter.vmServiceScrape.interval }}
      {{- with .Values.opnsenseExporter.vmServiceScrape.metricRelabelConfigs }}
      metricRelabelConfigs:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
