# yaml-language-server: $schema=values.schema.json

replicaCount: 1
revisionHistoryLimit: 1

nameOverride: ""
fullnameOverride: ""

opnsenseExporter:
  nameOverride: opnsense-exporter
  image:
    repository: ghcr.io/yaelmoshi/opnsense-exporter
    tag: "v0.0.15-m0sh1.3@sha256:b5ff0aba48705ce89dd46c351bf686ec97be834b84a2d4710f464ed82dbc8c39"
    pullPolicy: IfNotPresent
  opnsense:
    protocol: https
    address: opnsense.example.com
    instanceLabel: opnsense
    existingSecret: opnsense-exporter-api
    apiKeyKey: api-key
    apiSecretKey: api-secret
  service:
    port: 8080
  serviceMonitor:
    enabled: true
    interval: 30s
    additionalLabels: {}
    metricRelabelings: []
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}
podAnnotations: {}

snmpExporter:
  fullnameOverride: prometheus-snmp-exporter
  image:
    repository: ghcr.io/yaelmoshi/snmp-exporter
    tag: "v0.30.1-m0sh1.1@sha256:c315d2137b08e81769016c50d8cc045d516a636a8f543fa85111a997b2612a91"
    pullPolicy: IfNotPresent
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi
  serviceMonitor:
    enabled: false
    namespace: monitoring
    path: /snmp
    scrapeTimeout: 25s
    module:
      - if_mib
    auth:
      - public_v2
    selector: {}
    honorLabels: true
    params: []
    selfMonitor:
      enabled: false

pveexporter:
  fullnameOverride: prometheus-pve-exporter
  image:
    registry: docker.io
    repository: prompve/prometheus-pve-exporter
    tag: "3.9.0@sha256:78a58df7a31c9fbee94962cd06422672668529de6421892df9aed4b6cee0757f"
    pullPolicy: Always
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  env:
    pveAuthType: token
    pveUser: pve-exporter@pve
    pveExistingSecretName: monitoring-pve-exporter
    pveVerifySsl: false
  podAnnotations: {}
  serviceMonitor:
    enabled: true
    additionalLabels: {}
    interval: 30s
    namespace: monitoring
    metricRelabelings:
      - targetLabel: instance
        replacement: prometheus-pve-exporter
    pveTargets: []
