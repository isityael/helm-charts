apiVersion: v2
name: matrix-umbrella
description: DHI-first umbrella chart for Matrix Synapse, MAS, Element Web, Cinny, and mautrix bridges
type: application
version: 0.1.21
appVersion: "26.6.2"
kubeVersion: ">=1.28.0-0"
home: https://matrix.org
icon: https://matrix.org/images/matrix-logo.svg
maintainers:
  - name: m0sh1
    email: yael@m0sh1.cc
    url: https://github.com/isityael
sources:
  - https://github.com/element-hq/ess-helm
  - https://github.com/element-hq/synapse
  - https://github.com/element-hq/matrix-authentication-service
  - https://github.com/element-hq/element-web
  - https://github.com/cinnyapp/cinny
  - https://github.com/mautrix/discord
  - https://github.com/mautrix/signal
  - https://github.com/mautrix/telegram
  - https://github.com/mautrix/whatsapp
  - https://github.com/matrix-org/matrix-appservice-irc
  - https://github.com/isityael/helm-charts
keywords:
  - matrix
  - synapse
  - element
  - cinny
  - mas
  - oidc
  - mautrix
  - bridge
annotations:
  category: Communication
  licenses: AGPL-3.0-only
  artifacthub.io/license: AGPL-3.0-only
  artifacthub.io/links: |
    - name: Matrix
      url: https://matrix.org
    - name: Element Server Suite Helm
      url: https://github.com/element-hq/ess-helm
    - name: Chart source
      url: https://github.com/isityael/helm-charts/tree/main/charts/matrix-umbrella
  artifacthub.io/changes: |
    - kind: fixed
      description: Allow mautrix bridge images to be overridden with a full image reference for image updater write-back
    - kind: fixed
      description: Start mautrix bridge images directly as non-root when using restricted PodSecurity defaults
    - kind: fixed
      description: Run mautrix bridge deployments with restricted PodSecurity-compatible defaults
    - kind: added
      description: Allow mautrix bridge deployments to consume pre-created config and registration Secrets
    - kind: fixed
      description: Keep ESS image digest suffixes out of default tag values so hook labels remain Kubernetes-valid
    - kind: fixed
      description: Keep image digest suffixes out of default tag values so ESS hook labels remain Kubernetes-valid
    - kind: fixed
      description: Move ESS image digest pins out of tag values so Kubernetes labels remain valid
    - kind: fixed
      description: Use Docker Hardened Images HAProxy 3.4.1 on Debian 13 for the ESS HAProxy deployment by default
    - kind: fixed
      description: Mount writable nginx runtime directories for non-root Cinny deployments
    - kind: fixed
      description: Tag the vendored Cinny Helm test image and annotate CI-rendered ESS hook Jobs for kube-linter
    - kind: fixed
      description: Vendor a patched Cinny chart so the config volume renders valid Kubernetes
    - kind: added
      description: Initial DHI-first Matrix umbrella chart
dependencies:
  - name: matrix-stack
    alias: ess
    version: 26.6.2
    repository: oci://ghcr.io/element-hq/ess-helm
  - name: mautrix-bridge
    alias: mautrix-discord
    version: 0.0.34
    repository: file://charts/mautrix-bridge
    tags:
      - mautrix-discord
  - name: mautrix-bridge
    alias: mautrix-signal
    version: 0.0.34
    repository: file://charts/mautrix-bridge
    tags:
      - mautrix-signal
  - name: mautrix-bridge
    alias: mautrix-telegram
    version: 0.0.34
    repository: file://charts/mautrix-bridge
    tags:
      - mautrix-telegram
  - name: mautrix-bridge
    alias: mautrix-whatsapp
    version: 0.0.34
    repository: file://charts/mautrix-bridge
    tags:
      - mautrix-whatsapp
  - name: matrix-appservice-irc
    version: 1.0.0
    repository: https://cyclikal94.github.io/matrix-helm-charts
    tags:
      - matrix-appservice-irc
  - name: cinny
    version: 0.2.23
    repository: file://charts/cinny
    tags:
      - cinny
