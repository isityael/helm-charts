serverName: ci.example.test
homeserverUrl: https://matrix.ci.example.test

ess:
  serverName: ci.example.test
  initSecrets:
    annotations:
      ignore-check.kube-linter.io/job-ttl-seconds-after-finished: "ESS hook Job TTL is upstream-managed."
  deploymentMarkers:
    annotations:
      ignore-check.kube-linter.io/job-ttl-seconds-after-finished: "ESS hook Job TTL is upstream-managed."
  elementWeb:
    ingress:
      host: element.ci.example.test
  matrixAuthenticationService:
    ingress:
      host: account.ci.example.test
    postgres:
      host: postgres.ci.svc.cluster.local
      user: mas
      database: mas
      password:
        secret: matrix-postgres-auth
        secretKey: mas-password
  synapse:
    checkConfigHook:
      annotations:
        ignore-check.kube-linter.io/job-ttl-seconds-after-finished: "ESS hook Job TTL is upstream-managed."
    ingress:
      host: matrix.ci.example.test
    postgres:
      host: postgres.ci.svc.cluster.local
      user: synapse
      database: synapse
      password:
        secret: matrix-postgres-auth
        secretKey: synapse-password
    redis:
      host: valkey.ci.svc.cluster.local
      db: 0
  wellKnownDelegation:
    baseDomainRedirect:
      url: https://element.ci.example.test

cinny:
  config:
    homeserverList:
      - ci.example.test
