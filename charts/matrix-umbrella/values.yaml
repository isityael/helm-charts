# Matrix umbrella chart default values.
#
# Defaults are DHI-first where this chart can safely use generic runtime images.
# Matrix-specific images without compatible DHI replacements intentionally remain
# on upstream registries and are exposed here so Renovate can track them.

matrixUmbrella:
  # Default policy for this chart. The value is documentation and validation
  # surface for consumers; subcharts use their own image value structures.
  imageProfile: dhi
  imagePullSecrets: []
  dhi:
    registry: dhi.io

tags:
  cinny: true
  mautrix-discord: false
  mautrix-signal: false
  mautrix-telegram: false
  mautrix-whatsapp: false
  matrix-appservice-irc: false

serverName: example.com
homeserverUrl: https://matrix.example.com

ess:
  serverName: example.com

  image:
    pullSecrets: []

  matrixTools:
    image:
      registry: ghcr.io
      repository: element-hq/ess-helm/matrix-tools
      tag: "0.8.0"
      digest: sha256:05e8ee593c95470bb23378fd99aad4f36fd64ae104b3ba0f4457a5fbd06e2c2f
      pullSecrets: []

  # Production default: use an external PostgreSQL service.
  postgres:
    enabled: false
    image:
      registry: dhi.io
      repository: postgres
      tag: "18.4-alpine3.24"
      digest: sha256:a9cf0fdee9601c46bd68f5215213d6f21e72f9ccf60224a2a5bafc984f7cb8a8

  # Production default: use an external Redis-compatible service, preferably Valkey.
  redis:
    image:
      registry: dhi.io
      repository: valkey
      tag: "9.1.0-debian13"
      digest: sha256:9697cb735fda12759e252a4bebaf97f0e4637cdfc915c40edf65e0b5f3cc02cf

  storage:
    resourcePolicy: keep

  ingress:
    tlsEnabled: true

  haproxy:
    image:
      registry: dhi.io
      repository: haproxy
      tag: "3.4.2-debian13"
      digest: sha256:0bb930bac61c44cdecdc36ec125c0179e3ead95b1844da4560f13b5024499146

  elementWeb:
    enabled: true
    image:
      registry: oci.element.io
      repository: element-web
      tag: "v1.12.23"
      digest: sha256:2a65f32acc6fd7163523d1c4b5174de354b5ceb085898b15898f4d8ea01a8e3d
    ingress:
      host: element.example.com

  elementAdmin:
    enabled: false

  matrixAuthenticationService:
    enabled: true
    image:
      registry: ghcr.io
      repository: element-hq/matrix-authentication-service
      tag: "1.20.0"
      digest: sha256:1b0cc87ca6bd6186172a123228cfc3be4c94522d5ecc71e7baeaf23e48ce883a
    ingress:
      host: account.example.com
    postgres:
      host: postgres.example.svc.cluster.local
      port: 5432
      user: mas
      database: mas
      sslMode: prefer
      password:
        secret: matrix-postgres-auth
        secretKey: mas-password
    additional: {}

  synapse:
    enabled: true
    image:
      registry: oci.element.io
      repository: synapse
      tag: "v1.156.0"
      digest: sha256:d2215c4a0e0bbd304489af228345b31d6857c1a228175471358d3fda187c0d91
    ingress:
      host: matrix.example.com
    postgres:
      host: postgres.example.svc.cluster.local
      port: 5432
      user: synapse
      database: synapse
      sslMode: prefer
      password:
        secret: matrix-postgres-auth
        secretKey: synapse-password
    redis:
      host: valkey.example.svc.cluster.local
      port: 6379
      db: 0
      tls: false
    media:
      storage:
        size: 10Gi
    appservices: []
    additional:
      00-registration:
        config: |
          enable_registration: false

  wellKnownDelegation:
    enabled: true
    baseDomainRedirect:
      enabled: true
      url: https://element.example.com
    additional:
      client: |
        {"m.homeserver":{"base_url":"https://matrix.example.com"}}
      server: |
        {"m.server":"matrix.example.com:443"}
      support: "{}"

  matrixRTC:
    enabled: false

cinny:
  fullnameOverride: matrix-cinny
  image:
    registry: ghcr.io
    repository: cinnyapp/cinny
    tag: "v4.12.3"
    digest: sha256:9872ba04330c6707f531bb7681036c2777f762625e373ce00eedfcd28d469a24
    pullPolicy: IfNotPresent
  config:
    defaultHomeserver: 0
    homeserverList:
      - "example.com"
    allowCustomHomeservers: true
    featuredCommunities:
      openAsDefault: false
      spaces: []
      rooms: []
      servers: []
  ingress:
    enabled: false

mautrix-discord:
  fullnameOverride: matrix-mautrix-discord
  podSecurityContext:
    fsGroup: 1337
    runAsGroup: 1337
    runAsNonRoot: true
    runAsUser: 1337
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  existingSecret:
    name: ""
    configKey: config.yaml
    registrationKey: registration.yaml
  image:
    registry: dock.mau.dev
    repository: mautrix/discord
    tag: "v0.7.6"
    digest: sha256:e4946b0df6a2786c88ed490e0d2692e352f1b79b9ff0e821a33764bd8bd1fffd
    pullPolicy: IfNotPresent
  command:
    - /usr/bin/mautrix-discord
  config:
    homeserver:
      address: http://ess-synapse:8008
      domain: example.com
    appservice:
      address: http://matrix-mautrix-discord:29328
      id: discord
      bot:
        username: discordbot
    database:
      type: postgres
      uri: postgres://mautrix_discord:change-me@postgres.example.svc.cluster.local:5432/mautrix_discord?sslmode=prefer
    bridge:
      permissions:
        "example.com": user

