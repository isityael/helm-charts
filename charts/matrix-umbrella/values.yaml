# Matrix umbrella chart default values.
#
# Defaults are DHI-first where this chart can safely use generic runtime images.
# Matrix-specific images without compatible DHI replacements intentionally remain
# on upstream registries and are exposed here so Renovate can track them.

matrixUmbrella:
  # Default policy for this chart. The value is documentation and validation
  # surface for consumers; subcharts use their own image value structures.
  imageProfile: dhi
  imagePullSecrets: []
  dhi:
    registry: dhi.io

tags:
  cinny: true
  mautrix-discord: false
  mautrix-signal: false
  mautrix-telegram: false
  mautrix-whatsapp: false
  matrix-appservice-irc: false

serverName: example.com
homeserverUrl: https://matrix.example.com

ess:
  serverName: example.com

  image:
    pullSecrets: []

  matrixTools:
    image:
      registry: ghcr.io
      repository: element-hq/ess-helm/matrix-tools
      tag: "0.8.0"
      digest: sha256:05e8ee593c95470bb23378fd99aad4f36fd64ae104b3ba0f4457a5fbd06e2c2f
      pullSecrets: []

  # Production default: use an external PostgreSQL service.
  postgres:
    enabled: false
    image:
      registry: dhi.io
      repository: postgres
      tag: "18.4-alpine3.24@sha256:3bec1efd91149f9ef010bd9c1cf6f17466eff0efb103719f0514a0362c3dfc41"
      digest: sha256:68cc437027b1c8849717f6015d76807991d50784b4102238b8d16b5b41b8f3e1

  # Production default: use an external Redis-compatible service, preferably Valkey.
  redis:
    image:
      registry: dhi.io
      repository: valkey
      tag: "9.1.0-debian13@sha256:9697cb735fda12759e252a4bebaf97f0e4637cdfc915c40edf65e0b5f3cc02cf"
      digest: sha256:9c534dfa305961bb3eaa1326f8af68b21a386950cc94e693ce32647c9a41a360

  storage:
    resourcePolicy: keep

  ingress:
    tlsEnabled: true

  haproxy:
    image:
      registry: dhi.io
      repository: haproxy
      tag: "3.4.1-debian13@sha256:cc3bdcf4049e26efa76a225b1bfb7ae8d374ffa6ef6afb6c9304f1c085070990"
      digest: sha256:cc3bdcf4049e26efa76a225b1bfb7ae8d374ffa6ef6afb6c9304f1c085070990

  elementWeb:
    enabled: true
    image:
      registry: oci.element.io
      repository: element-web
      tag: "v1.12.22"
      digest: sha256:c93f51c0445ce48be5c2d66a61470ba51a78315c7c60a4fc0e791595b96f3a96
    ingress:
      host: element.example.com

  elementAdmin:
    enabled: false

  matrixAuthenticationService:
    enabled: true
    image:
      registry: ghcr.io
      repository: element-hq/matrix-authentication-service
      tag: "1.19.0"
      digest: sha256:fb25648b12e985d1192ea3dc7b6def38f97ca79bacba262daca5b82532e3a3dd
    ingress:
      host: account.example.com
    postgres:
      host: postgres.example.svc.cluster.local
      port: 5432
      user: mas
      database: mas
      sslMode: prefer
      password:
        secret: matrix-postgres-auth
        secretKey: mas-password
    additional: {}

  synapse:
    enabled: true
    image:
      registry: oci.element.io
      repository: synapse
      tag: "v1.155.0"
      digest: sha256:a87d002fba8efba807af19a876f488f4a9d298d6b62f5bab66d14e311a355e99
    ingress:
      host: matrix.example.com
    postgres:
      host: postgres.example.svc.cluster.local
      port: 5432
      user: synapse
      database: synapse
      sslMode: prefer
      password:
        secret: matrix-postgres-auth
        secretKey: synapse-password
    redis:
      host: valkey.example.svc.cluster.local
      port: 6379
      db: 0
      tls: false
    media:
      storage:
        size: 10Gi
    appservices: []
    additional:
      00-registration:
        config: |
          enable_registration: false

  wellKnownDelegation:
    enabled: true
    baseDomainRedirect:
      enabled: true
      url: https://element.example.com
    additional:
      client: |
        {"m.homeserver":{"base_url":"https://matrix.example.com"}}
      server: |
        {"m.server":"matrix.example.com:443"}
      support: "{}"

  matrixRTC:
    enabled: false

cinny:
  fullnameOverride: matrix-cinny
  image:
    registry: ghcr.io
    repository: cinnyapp/cinny
    tag: "v4.12.3@sha256:9872ba04330c6707f531bb7681036c2777f762625e373ce00eedfcd28d469a24"
    pullPolicy: IfNotPresent
  config:
    defaultHomeserver: 0
    homeserverList:
      - "example.com"
    allowCustomHomeservers: true
    featuredCommunities:
      openAsDefault: false
      spaces: []
      rooms: []
      servers: []
  ingress:
    enabled: false

mautrix-discord:
  fullnameOverride: matrix-mautrix-discord
  image:
    registry: dock.mau.dev
    repository: mautrix/discord
    tag: "v0.7.6@sha256:e4946b0df6a2786c88ed490e0d2692e352f1b79b9ff0e821a33764bd8bd1fffd"
    pullPolicy: IfNotPresent
  config:
    homeserver:
      address: http://ess-synapse:8008
      domain: example.com
    appservice:
      address: http://matrix-mautrix-discord:29328
      id: discord
      bot:
        username: discordbot
    database:
      type: postgres
      uri: postgres://mautrix_discord:change-me@postgres.example.svc.cluster.local:5432/mautrix_discord?sslmode=prefer
    bridge:
      permissions:
        "example.com": user

