matrix-appservice-irc:
  fullnameOverride: matrix-appservice-irc
  host: irc.example.com
  image:
    repository: matrixdotorg/matrix-appservice-irc
    tag: "release-4.0.0@sha256:ab906656406d8cfa273e39385c0a3182f5cf9d9c4a03e981bb1dd62162802d37"
    pullPolicy: IfNotPresent
  pool:
    image:
      repository: matrixdotorg/matrix-appservice-irc
      tag: "release-4.0.0@sha256:ab906656406d8cfa273e39385c0a3182f5cf9d9c4a03e981bb1dd62162802d37"
      pullPolicy: IfNotPresent
  waitForRedis:
    image:
      repository: dhi.io/busybox
      tag: "1.37.0-musl"
      pullPolicy: IfNotPresent
  homeserver:
    url: http://ess-synapse:8008
    domain: example.com
  database:
    engine: postgres
    postgres:
      host: postgres.example.svc.cluster.local
      port: 5432
      user: matrix_appservice_irc
      password:
        value: change-me
      database: matrix_appservice_irc
      sslMode: prefer
  postgres:
    enabled: false
    image:
      repository: dhi.io/postgres
      tag: "18.4-alpine3.22@sha256:e98730eed81429024be09a6255e900b2e86923a799b03033ac6067b4b6c6250e"
      pullPolicy: IfNotPresent
  redis:
    enabled: false
    image:
      repository: dhi.io/valkey
      tag: "9.0.3-alpine3.22"
      pullPolicy: IfNotPresent
    args:
      - valkey-server
      - --appendonly
      - "yes"
    url: redis://valkey.example.svc.cluster.local:6379/1
  ingress:
    enabled: false
