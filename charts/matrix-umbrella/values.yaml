matrix-appservice-irc:
  fullnameOverride: matrix-appservice-irc
  host: irc.example.com
  image:
    repository: matrixdotorg/matrix-appservice-irc
    tag: "release-4.0.0"
    pullPolicy: IfNotPresent
  pool:
    image:
      repository: matrixdotorg/matrix-appservice-irc
      tag: "release-4.0.0"
      pullPolicy: IfNotPresent
  waitForRedis:
    image:
      repository: dhi.io/busybox
      tag: "1.38.0-alpine3.24"
      digest: sha256:69a25015bda2c7dfac5d3a88990b56bc0f38539b313c448b171edef1497193ad
      pullPolicy: IfNotPresent
  homeserver:
    url: http://ess-synapse:8008
    domain: example.com
  database:
    engine: postgres
    postgres:
      host: postgres.example.svc.cluster.local
      port: 5432
      user: matrix_appservice_irc
      password:
        value: change-me
      database: matrix_appservice_irc
      sslMode: prefer
  postgres:
    enabled: false
    image:
      repository: dhi.io/postgres
      tag: "18.4-alpine3.24"
      digest: sha256:a9cf0fdee9601c46bd68f5215213d6f21e72f9ccf60224a2a5bafc984f7cb8a8
      pullPolicy: IfNotPresent
  redis:
    enabled: false
    image:
      repository: dhi.io/valkey
      tag: "9.1.0-debian13"
      digest: sha256:9697cb735fda12759e252a4bebaf97f0e4637cdfc915c40edf65e0b5f3cc02cf
      pullPolicy: IfNotPresent
    args:
      - valkey-server
      - --appendonly
      - "yes"
    url: redis://valkey.example.svc.cluster.local:6379/1
  ingress:
    enabled: false
