        "example.com": user

mautrix-whatsapp:
  fullnameOverride: matrix-mautrix-whatsapp
  image:
    registry: dock.mau.dev
    repository: mautrix/whatsapp
    tag: "v0.2606.0"
    pullPolicy: IfNotPresent
  config:
    homeserver:
      address: http://ess-synapse:8008
      domain: example.com
    appservice:
      address: http://matrix-mautrix-whatsapp:29328
      id: whatsapp
      bot:
        username: whatsappbot
    database:
      type: postgres
      uri: postgres://mautrix_whatsapp:change-me@postgres.example.svc.cluster.local:5432/mautrix_whatsapp?sslmode=prefer
    bridge:
      permissions:
        "example.com": user

matrix-appservice-irc:
  fullnameOverride: matrix-appservice-irc
  host: irc.example.com
  image:
    repository: matrixdotorg/matrix-appservice-irc
    tag: "release-4.0.0"
    pullPolicy: IfNotPresent
  pool:
    image:
      repository: matrixdotorg/matrix-appservice-irc
      tag: "release-4.0.0"
      pullPolicy: IfNotPresent
  waitForRedis:
    image:
      repository: dhi.io/busybox
      tag: "1.37.0-musl"
      pullPolicy: IfNotPresent
  homeserver:
    url: http://ess-synapse:8008
    domain: example.com
  database:
    engine: postgres
    postgres:
      host: postgres.example.svc.cluster.local
      port: 5432
      user: matrix_appservice_irc
      password:
        value: change-me
      database: matrix_appservice_irc
      sslMode: prefer
  postgres:
    enabled: false
    image:
      repository: dhi.io/postgres
      tag: "18.4-alpine3.22"
      pullPolicy: IfNotPresent
  redis:
    enabled: false
    image:
      repository: dhi.io/valkey
      tag: "9.0.3-alpine3.22"
      pullPolicy: IfNotPresent
    args:
      - valkey-server
      - --appendonly
      - "yes"
    url: redis://valkey.example.svc.cluster.local:6379/1
  ingress:
    enabled: false
