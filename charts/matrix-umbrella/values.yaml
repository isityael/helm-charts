mautrix-whatsapp:
  fullnameOverride: matrix-mautrix-whatsapp
  image:
    registry: dock.mau.dev
    repository: mautrix/whatsapp
    tag: "v0.2606.0@sha256:3ecf348ac3451199fe1e7b894469bd8cf9b2abe58699f3b9a8029172c4356877"
    pullPolicy: IfNotPresent
  config:
    homeserver:
      address: http://ess-synapse:8008
      domain: example.com
    appservice:
      address: http://matrix-mautrix-whatsapp:29328
      id: whatsapp
      bot:
