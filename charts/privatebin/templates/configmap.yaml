{{- $extra := .Values.config.extra | default "" -}}
{{- if and (eq .Values.storage.backend "s3") (regexMatch `(?im)^[ \t]*(accesskey|secretkey)[ \t]*=` $extra) -}}
{{- fail "privatebin chart: config.extra must not define accesskey or secretkey when storage.backend=s3; use storage.s3.existingSecret" -}}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "privatebin.fullname" . }}-config
  labels:
    {{- include "privatebin.labels" . | nindent 4 }}
data:
  conf.php: |
    ;<?php http_response_code(403); /*
    [main]
    name = {{ .Values.config.name | quote }}
    discussion = {{ .Values.config.discussion }}
    password = {{ .Values.config.password }}
    fileupload = {{ .Values.config.fileUpload }}
    burnafterreadingselected = {{ .Values.config.burnAfterReadingSelected }}
    defaultformatter = {{ .Values.config.defaultFormatter | quote }}
    sizelimit = {{ .Values.config.sizeLimit }}
    template = {{ .Values.config.template | quote }}
    qrcode = {{ .Values.config.qrcode }}
    email = {{ .Values.config.email }}
    compression = {{ .Values.config.compression | quote }}

    [expire]
    default = {{ .Values.config.defaultExpire | quote }}

    [expire_options]
    {{- range $key, $value := .Values.config.expireOptions }}
    {{ $key }} = {{ $value }}
    {{- end }}

    [traffic]
    limit = {{ .Values.config.trafficLimit }}

    [purge]
    limit = {{ .Values.config.purgeLimit }}
    batchsize = {{ .Values.config.purgeBatchSize }}

    [model]
    {{- if eq .Values.storage.backend "s3" }}
    class = S3Storage
    {{- else }}
    class = Filesystem
    {{- end }}

    [model_options]
    {{- if eq .Values.storage.backend "s3" }}
    region = {{ .Values.storage.s3.region | quote }}
    version = {{ .Values.storage.s3.version | quote }}
    endpoint = {{ .Values.storage.s3.endpoint | quote }}
    use_path_style_endpoint = {{ .Values.storage.s3.usePathStyleEndpoint }}
    bucket = {{ .Values.storage.s3.bucket | quote }}
    prefix = {{ .Values.storage.s3.prefix | quote }}
    {{- else }}
    dir = {{ .Values.persistence.mountPath | quote }}
    {{- end }}
    {{- with $extra }}
    {{ . | nindent 4 }}
    {{- end }}
    ; */
  php.ini: |
    upload_max_filesize = {{ .Values.php.uploadMaxFilesize }}
    post_max_size = {{ .Values.php.postMaxSize }}
    memory_limit = {{ .Values.php.memoryLimit }}
{{- if .Values.noIndex.enabled }}
  robots.txt: |
{{ .Values.noIndex.robotsTxt | indent 4 }}
{{- end }}
