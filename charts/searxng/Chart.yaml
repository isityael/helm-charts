apiVersion: v2
name: searxng
description: Helm chart for SearXNG metasearch with optional Valkey limiter backend
home: https://docs.searxng.org
icon: https://raw.githubusercontent.com/searxng/searxng/master/src/brand/searxng.svg
type: application
version: 0.2.8
appVersion: "2026.5.13-8e5aa9d39"
kubeVersion: ">=1.28.0-0"
maintainers:
  - name: m0sh1
    email: yael@m0sh1.cc
    url: https://github.com/isityael
sources:
  - https://github.com/searxng/searxng
  - https://github.com/isityael/helm-charts
keywords:
  - searxng
  - search
  - metasearch
  - privacy
annotations:
  category: Search
  licenses: AGPL-3.0-or-later
  artifacthub.io/license: AGPL-3.0-or-later
  artifacthub.io/changes: |
    - kind: fixed
      description: Remove stale precompressed CSS assets after appending generated theme overrides.
    - kind: added
      description: Add optional SearXNG theme variants generated from the bundled simple theme.
    - kind: added
      description: Add extra volume and volumeMount hooks for advanced customization.
    - kind: added
      description: Expose SearXNG UI theme_args, static_path, and templates_path settings.
    - kind: changed
      description: Use Docker Hardened Images Busybox for config rendering.
    - kind: changed
      description: Pin the embedded Valkey limiter backend to the Debian 13 runtime image.
    - kind: changed
      description: Use the Docker Hardened Images Valkey 9 runtime for the embedded limiter backend.
    - kind: fixed
      description: Set SEARXNG_PORT explicitly to avoid Kubernetes service environment collisions.
    - kind: changed
      description: Render generated config as the SearXNG runtime UID and GID.
    - kind: changed
      description: Add imagePullSecrets support for the embedded Valkey limiter deployment.
    - kind: added
      description: Initial chart with Gateway API, generated settings, and optional Valkey limiter backend.
