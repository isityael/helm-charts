secret:
  value: test-secret-change-me
settings:
  server:
    baseUrl: https://search.example.com/
  ui:
    defaultTheme: m0sh1-dark
    themeArgs:
      simpleStyle: dark
themes:
  enabled: true
  variants:
    - name: m0sh1-dark
      cssAppend: |
        :root.theme-auto,
        :root.theme-light,
        :root.theme-dark,
        :root.theme-black {
          --color-btn-background: #3f5cff;
          --color-categories-item-selected-font: #3f5cff;
          --color-categories-item-border-selected: #3f5cff;
          --color-result-link-font: #6f8cff;
          --color-result-link-font-highlight: #6f8cff;
        }
httpRoute:
  enabled: true
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - search.example.com
ingress:
  hosts:
    - host: search.example.com
      paths:
        - path: /
          pathType: Prefix
cache:
  storageClass: local-path
