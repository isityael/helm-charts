replicaCount: 1
revisionHistoryLimit: 2

image:
  repository: ghcr.io/searxng/searxng
  tag: "2026.5.13-8e5aa9d39@sha256:e37c25170d9f5947b16713af33e0ab41f0e6e6e73685e19c30fc6bb63562f801"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 977
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 977
  runAsGroup: 977
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 8080
  containerPort: 8080

env: []
extraEnvFrom: []

configRenderer:
  image:
    repository: dhi.io/busybox
    tag: "1.37.0-debian13@sha256:e0cbe035dd7d7072e088172c5833bf756bfba3618567c0f5e73288e97e3a19bf"
    pullPolicy: IfNotPresent
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 977
    runAsGroup: 977
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

secret:
  existingSecret: ""
  existingSecretKey: SEARXNG_SECRET
  value: ""

settings:
  useDefaultSettings: true
  server:
    baseUrl: https://search.example.com/
    method: GET
    limiter: true
    imageProxy: true
    publicInstance: false
  search:
    safeSearch: 0
    autocomplete: duckduckgo
    formats:
      - html
      - json
  ui:
    defaultTheme: simple
    queryInTitle: true
    infiniteScroll: false
    resultsOnNewTab: true
  outgoing:
    requestTimeout: 3.0
    maxRequestTimeout: 10.0
  extra: {}

limiterToml: |
  [botdetection.ip_limit]
  link_token = true

valkey:
  enabled: true
  image:
    repository: dhi.io/valkey
    tag: "9.1.0-debian13@sha256:54bfadfa9596a4c24ad1879b190401310b0a767697e5ac58b198020568961b23"
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  url: ""
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsUser: 1000
    runAsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

cache:
  enabled: true
  storageClass: ""
  size: 1Gi
  accessMode: ReadWriteOnce
  existingClaim: ""
  mountPath: /var/cache/searxng

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: search.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []

probes:
  liveness:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 768Mi

nodeSelector: {}
tolerations: []
affinity: {}
