{{- if and .Values.ingress.enabled .Values.httpRoute.enabled -}}
{{- fail "tailscale-webhook-relay chart: only one of ingress.enabled or httpRoute.enabled can be true" -}}
{{- end -}}
{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tailscale-webhook-relay.fullname" . }}
  labels:
    {{- include "tailscale-webhook-relay.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "tailscale-webhook-relay.fullname" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
{{- if .Values.httpRoute.enabled -}}
{{- if eq (len .Values.httpRoute.parentRefs) 0 -}}
{{- fail "tailscale-webhook-relay chart: httpRoute.parentRefs must contain at least one Gateway parentRef when httpRoute.enabled=true" -}}
{{- end -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "tailscale-webhook-relay.fullname" . }}
  labels:
    {{- include "tailscale-webhook-relay.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.httpRoute.parentRefs }}
    - group: {{ .group | default "gateway.networking.k8s.io" | quote }}
      kind: {{ .kind | default "Gateway" | quote }}
      name: {{ .name | quote }}
      namespace: {{ .namespace | quote }}
      sectionName: {{ .sectionName | quote }}
    {{- end }}
  hostnames:
    {{- if .Values.httpRoute.hostnames }}
    {{- range .Values.httpRoute.hostnames }}
    - {{ . | quote }}
    {{- end }}
    {{- else }}
    {{- range .Values.ingress.hosts }}
    - {{ .host | quote }}
    {{- end }}
    {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    {{- range .paths }}
    {{- $gatewayPathType := "PathPrefix" }}
    {{- if eq .pathType "Exact" }}
    {{- $gatewayPathType = "Exact" }}
    {{- end }}
    - matches:
        - path:
            type: {{ $gatewayPathType }}
            value: {{ .path | quote }}
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "tailscale-webhook-relay.fullname" $ }}
          port: {{ $.Values.service.port }}
          weight: 1
    {{- end }}
    {{- end }}
{{- end }}
