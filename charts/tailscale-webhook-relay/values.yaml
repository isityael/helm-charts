# Default values for tailscale-webhook-relay.

image:
  repository: ghcr.io/sm-moshi/tailscale-webhook-relay
  pullPolicy: IfNotPresent
  tag: "@sha256:fc3416ec5584224b82983752d9398e9ceff8f4d7d045a955362f5923bde875f4"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- ntfy target URL (e.g. https://ntfy.m0sh1.cc/tailscale-events)
ntfyURL: ""

# -- Existing secret containing TAILSCALE_WEBHOOK_SECRET and NTFY_TOKEN keys
existingSecret: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tailscale-webhook.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 5m
    memory: 16Mi
  limits:
    memory: 32Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

nodeSelector:
  kubernetes.io/os: linux

tolerations: []
affinity: {}
