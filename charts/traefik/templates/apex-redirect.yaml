{{- with .Values.apexRedirect }}
{{- if .enabled }}
{{- /*
  Apex + www redirect for m0sh1.cc.

  Addresses two external findings from 2026-04-09:
  - mxtoolbox: `http m0sh1.cc - The remote name could not be resolved`
    (apex had no A record; automated tooling 404s on bare-domain probes)
  - Cloudflare Security Insights: cosmetic nag about no landing page on
    the apex.

  Routes:
    Host(m0sh1.cc) || Host(www.m0sh1.cc) → 301 to https://status.m0sh1.cc/

  Uses the Gateway API native RequestRedirect filter so the route resolves
  entirely inside the kubernetesGateway provider — avoids the Traefik
  startup race where HTTPRoutes reference Middleware CRs before the
  kubernetesCRD provider has loaded them.
*/ -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: apex-m0sh1-redirect
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: apex-redirect
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: {{ $.Release.Namespace }}
      sectionName: websecure
  hostnames:
    - "m0sh1.cc"
    - "www.m0sh1.cc"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: status.m0sh1.cc
            path:
              type: ReplaceFullPath
              replaceFullPath: /
            statusCode: 301
{{- end }}
{{- end }}
