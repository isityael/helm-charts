apiVersion: v1
kind: Service
metadata:
  name: {{ include "wud.fullname" . }}
  labels:
    {{- include "wud.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "wud.selectorLabels" . | nindent 4 }}
