{{- if and (eq .Values.database.type "embedded") .Values.mariadb.enabled (not .Values.mariadb.auth.existingSecret.name) }}
{{- $secretName := include "youtarr.mariadb.secretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $rootPassword := randAlphaNum 32 }}
{{- $password := randAlphaNum 32 }}
{{- if $existing }}
{{- if index $existing.data .Values.mariadb.auth.existingSecret.rootPasswordKey }}
{{- $rootPassword = index $existing.data .Values.mariadb.auth.existingSecret.rootPasswordKey | b64dec }}
{{- end }}
{{- if index $existing.data .Values.mariadb.auth.existingSecret.passwordKey }}
{{- $password = index $existing.data .Values.mariadb.auth.existingSecret.passwordKey | b64dec }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "youtarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
type: Opaque
stringData:
  {{ .Values.mariadb.auth.existingSecret.rootPasswordKey }}: {{ $rootPassword | quote }}
  {{ .Values.mariadb.auth.existingSecret.passwordKey }}: {{ $password | quote }}
{{- end }}
