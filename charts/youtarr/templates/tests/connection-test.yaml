apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "youtarr.fullname" . }}-test-connection"
  labels:
    {{- include "youtarr.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: docker.io/library/busybox:1.37.0
      command:
        - wget
      args:
        - -qO-
        - http://{{ include "youtarr.fullname" . }}:{{ .Values.service.port }}/api/health
