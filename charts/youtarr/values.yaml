replicaCount: 1
revisionHistoryLimit: 2
strategy: {}

image:
  repository: docker.io/dialmaster/youtarr
  tag: v1.74.0@sha256:ffb8bc3d45a5b6ed2bc1ec7cfd2fea60c095f6157bb03d8a52c02187b1992fcf
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

youtarr:
  timezone: UTC
  uid: 1000
  gid: 1000
  logLevel: info
  trustProxy: ""
  dataPath: ""

# Values merged into /app/config/config.json before Youtarr starts.
# Example:
# configOverrides:
#   autoUpdateYtdlp: true
configOverrides: {}

# Secret-backed values merged into /app/config/config.json before Youtarr starts.
# Example:
# configSecretOverrides:
#   jellyfinApiKey:
#     secretName: youtarr-jellyfin
#     secretKey: api-key
configSecretOverrides: {}

cookies:
  existingSecret:
    name: ""
    key: cookies.user.txt
  mountPath: /app/config/cookies.user.txt

auth:
  enabled: true
  presetExistingSecret:
    name: ""
    usernameKey: username
    passwordKey: password

database:
  type: embedded

mariadb:
  enabled: true
  image:
    repository: dhi.io/mariadb
    tag: 12.3.2-debian13@sha256:170533219449cece2148e5d998700caf13a89fcae1367fb42964bdee2d6ef100
    digest: sha256:9378d3cd184a741d9664d37ad3bdc5729fd7131ff06bb09b7188b6df7b33b3de
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  auth:
    database: youtarr
    username: youtarr
    existingSecret:
      name: ""
      rootPasswordKey: mariadb-root-password
      passwordKey: mariadb-password
  persistence:
    enabled: true
    storageClass: ""
    size: 8Gi
    accessMode: ReadWriteOnce
    existingClaim: ""
  podSecurityContext:
    fsGroup: 65532
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 1Gi

externalDatabase:
  host: ""
  port: 3306
  database: youtarr
  username: youtarr
  existingSecret:
    name: ""
    passwordKey: password

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 80
  containerPort: 3011

persistence:
  downloads:
    enabled: true
    storageClass: ""
    size: 20Gi
    accessMode: ReadWriteOnce
    existingClaim: ""
    hostPath:
      enabled: false
      path: ""
      type: DirectoryOrCreate
  config:
    enabled: true
    storageClass: ""
    size: 1Gi
    accessMode: ReadWriteOnce
    existingClaim: ""
  jobs:
    enabled: true
    storageClass: ""
    size: 1Gi
    accessMode: ReadWriteOnce
    existingClaim: ""
  images:
    enabled: true
    storageClass: ""
    size: 5Gi
    accessMode: ReadWriteOnce
    existingClaim: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: youtarr.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []

probes:
  liveness:
    enabled: true
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    enabled: true
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

extraEnv: []

nodeSelector: {}
tolerations: []
affinity: {}
