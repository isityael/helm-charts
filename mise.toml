# Mise configuration for m0sh1.cc/helm-charts
min_version = "2026.06.01"

[settings]
auto_install           = true
not_found_auto_install = true
task_run_auto_install  = true

[settings.status]
show_tools = true
show_env   = false
truncate   = true

[tools]
node        = "26.3.1"
helm        = "4.2.2"
kubectl     = "1.36.2"
kustomize   = "5.8.1"
kubeconform = "0.8.0"
kube-linter = "0.8.3"
helm-diff   = { version = "3.15.10", bin = "diff", bin_path = "diff/bin", rename_exe = "helm-diff", exe = "diff" }
trivy       = "0.71.2"
python      = "3.15.0b2"
shellcheck  = "0.11.0"
eza         = "0.23.4"
rg          = "15.1.0"
git-cliff   = "2.13.1"
prek        = "0.4.5"

[env]
_.python.venv = { path = ".venv", create = true } # create the venv if it doesn't exist

[tasks.helm-deps-update]
description = "Update Helm chart dependencies"
run = """
set -euo pipefail
for chart in charts/*/; do
  [ -f "${chart}Chart.yaml" ] || continue
  echo "Updating Helm dependencies for ${chart}"
  helm dependency update "${chart}"
done
"""

[tasks.helm-deps-check]
run         = ".ci/check-helm-dependencies.sh"
description = "Verify committed Helm dependency archives match Chart.lock"

[tasks.helm-lint]
description = "Lint Helm charts"
run = """
set -euo pipefail
for chart in charts/*/; do
  [ -f "${chart}Chart.yaml" ] || continue
  echo "Linting Helm chart ${chart}"
  case "${chart}" in
    charts/matrix-umbrella/)
      # matrix-umbrella vendors upstream charts whose standalone defaults do
      # not lint with --with-subcharts. Validate the parent values and rendered
      # umbrella output instead; dependency archives are still checked by
      # helm-deps-check.
      helm lint "${chart}" --strict
      ;;
    *)
      helm lint "${chart}" --with-subcharts --strict
      ;;
  esac
done
"""

[tasks.test-shell]
run         = ".ci/test-shell.sh"
description = "Run shell script tests"

[tasks.kube-linter]
run         = "kube-linter lint .ci/rendered --config .kube-linter.yaml"
description = "Lint rendered Kubernetes manifests with the repository policy"

# === Changelog tasks ===
[tasks.changelog]
description = "Update unreleased section of CHANGELOG.md"
run = """
set -euo pipefail
echo "📝 Updating CHANGELOG.md with unreleased changes..."

# Check if CHANGELOG.md exists
if [ ! -f CHANGELOG.md ]; then
  echo "⚠️  CHANGELOG.md not found. Generating initial changelog..."
  git-cliff -o CHANGELOG.md
  echo "✅ Initial CHANGELOG.md created!"
  exit 0
fi

# Regenerate the entire changelog to include new unreleased commits
git-cliff -o CHANGELOG.md
echo "✅ CHANGELOG.md updated!"
"""

[tasks.changelog-bump]
description = "Bump version and update changelog for a release"
run = """
set -euo pipefail

if [ -z "${1:-}" ]; then
  echo "❌ Error: Version number required"
  echo ""
  echo "Usage: mise run changelog-bump <version>"
  echo "Example: mise run changelog-bump 0.1.4"
  exit 1
fi

VERSION="$1"

# Validate version format (basic semver check)
if ! echo "$VERSION" | grep -qE '^[0-9]+\\.[0-9]+\\.[0-9]+$'; then
  echo "❌ Error: Invalid version format. Expected: X.Y.Z (e.g., 0.1.4)"
  exit 1
fi

echo "📝 Creating release v$VERSION..."

# Generate changelog for the new version
git-cliff --tag "v$VERSION" -o CHANGELOG.md

echo "✅ CHANGELOG.md updated for v$VERSION!"
echo ""
echo "Next steps:"
echo "  1. Review CHANGELOG.md"
echo "  2. Update any versioned references in docs/manifests if applicable"
echo "  3. Commit changes:"
echo "     git add CHANGELOG.md && git commit -m 'chore: release v$VERSION'"
echo "  4. Create annotated tag:"
echo "     git tag -a v$VERSION -m 'Release v$VERSION'"
echo "  5. Push to GitHub:"
echo "     git push && git push --tags"
"""

[tasks.markdown-lint]
description = "Lint Markdown files"
run         = "rumdl check ."

[tasks.markdown-fix]
description = "Fix Markdown files"
run         = "rumdl fmt ."

[tasks.hooks-install]
description = "Install prek hooks"
run         = "prek install -f"

[tasks.pre-commit-run]
description = "Run prek hooks"
run         = "prek run --all-files"
